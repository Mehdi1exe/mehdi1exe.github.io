            :root[data-theme-color=light] {

                width: 10px
            }

                background: var(--button-view-default-fill-color-base);

                box-sizing: border-box;
                padding: 32px
            }

            .game-unsupported-modal__title {
                margin-top: 0
            }

            .game-unsupported-modal {
                align-items: center;
                display: flex;
                justify-content: center
            }

            .game-unsupported-modal__title {
                font-size: 28px;
                font-weight: 500;
                line-height: 34px
            }

            .game-unsupported-modal__content {

                display: flex;
                width: 1178px
            }

            .game-unsupported-modal__image-wrapper {
                margin-right: 30px
            }

            }

            .YandexHeader-Logo_lang_en,.YandexHeader-Logo_lang_ru {
                background-position: 50%;
                background-repeat: no-repeat;
                background-size: contain
            }

            .logo-link {
                cursor: pointer;
                font-size: 0;
                outline: 0
            }

            .logo-link,.logo-link span {
                align-items: center;
                display: flex
            }

            .logo-link img {
                border: none;
                flex-shrink: 0
            }

            :root {
                --iphone-bangs-padding-left: 0
            }

            .adv-game-loader {
                background: var(--black-1000);
                height: 100%;
                left: 0;
                position: absolute;
                top: 0;
                width: 100%;
                z-index: var(--z-index-game-loader)
            }

            .adv-game-loader__preloading-content-container {
                align-items: center;
                display: flex;
                flex-direction: column;
                gap: 18px;
                justify-content: center
            }

            .adv-game-loader__preloading-content-container .preloading-content__game-icon {
                animation: startRotate .35s ease-in,pulse 1s linear .35s infinite
            }

            .adv-game-loader__preloading-content-container_game-loaded .preloading-content__game-icon {
                animation: none;
                animation-play-state: paused
            }

            .adv-game-loader__preloading-content-title {
                color: var(--color-text-white,var(--white-1000));
                font-size: 15px;
                font-weight: var(--typography-font-weight-medium);
                line-height: 120%;
                overflow: hidden;
                text-align: center;
                text-overflow: ellipsis;
                white-space: nowrap
            }

            .adv-game-loader__guard-text-container_hidden {
                visibility: hidden
            }

            .adv-game-loader__guard-text {
                color: var(--color-text-splash-screen-guard);
                font-size: 13px;
                font-style: normal;
                font-weight: var(--typography-font-weight-regular);
                line-height: 120%
            }

            .adv-game-loader__guard-text a {
                color: var(--color-link-primary);
                -webkit-text-decoration: none;
                text-decoration: none
            }

            .adv-game-loader__guard-text a:hover {
                color: var(--color-link-hover)
            }

            .adv-game-loader__play-button-container {
                flex-direction: column;
                gap: 12px
            }

            .adv-game-loader__play-button-container,.adv-game-loader__splash-adv-container {
                align-items: center;
                display: flex;
                justify-content: center
            }

            .adv-game-loader .splash-adv {
                width: 100%
            }

            .adv-game-loader .splash-adv__block-container {
                background: var(--color-grey-10);
                height: 250px;
                width: 300px
            }

            .adv-game-loader .splash-adv__block-container_failed {
                display: none
            }

            @keyframes pulse {
                0% {
                    transform: scale(1)
                }

                50% {
                    transform: scale(1.15)
                }

                to {
                    transform: scale(1)
                }
            }

            @keyframes startRotate {
                0% {
                    opacity: .5;
                    transform: rotate(10deg)
                }

                to {
                    opacity: 1;
                    transform: rotate(0deg)
                }
            }

            .play-button {
                align-items: center;
                background: var(--color-background-splash-screen-button);
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                font-family: var(--font-family-splash-screen-button);
                gap: 12px;
                height: 40px;
                justify-content: center;
                width: 268px
            }

            .play-button_loading {
                animation: startChangeColor .35s ease-in,changeColor 1s linear .35s infinite;
                background: var(--black-1000);
                cursor: auto
            }

            .play-button__text {
                color: var(--color-text-splash-screen-button);
                font-size: 15px;
                font-style: normal;
                font-weight: var(--typography-font-weight-medium);
                line-height: 120%;
                text-align: center
            }

            .play-button__text_loading {
                color: var(--white-1000)
            }

            @keyframes changeColor {
                0% {
                    background: var(--black-1000)
                }

                50% {
                    background: #384352
                }

                to {
                    background: var(--black-1000)
                }
            }

            @keyframes startChangeColor {
                0% {
                    background: var(--black-1000)
                }

                to {
                    background: #384352
                }
            }

            .fake-splash-adv {
                display: flex;
                gap: 15px;
                justify-content: center
            }

            .fake-splash-adv__block {
                animation-duration: 1s;
                animation-fill-mode: forwards;
                animation-iteration-count: infinite;
                animation-name: placeHolderShimmer;
                animation-timing-function: linear;
                background: var(--color-grey-10);
                background: linear-gradient(to right,#444 8%,var(--color-grey-5) 18%,#444 33%);
                background-size: 800px 104px;
                border-radius: 8px;
                height: 250px;
                position: relative;
                width: 300px;
                will-change: background-position
            }

            @keyframes placeHolderShimmer {
                0% {
                    background-position: -468px 0
                }

                to {
                    background-position: 468px 0
                }
            }

            .adv-game-loader {
                --center-point-y: calc(50% + 97px);
                align-items: center;
                background: var(--black-1000);
                height: 100%;
                justify-content: space-around;
                width: 100%
            }

            .adv-game-loader__preloading-content-container {
                left: 50%;
                position: absolute;
                top: calc(50% - 82px);
                transform: translateX(-50%)
            }
