<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BRAWL ARENA - Brawl Stars Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0b2f1f, #071a10);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Roboto', sans-serif;
            padding: 20px;
        }

        /* Hauptcontainer */
        .app-container {
            background: #2b4829;
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 8px 20px black;
            cursor: crosshair;
            background: #6fa84f;
        }

        /* Menü-Overlay (wird über Canvas gelegt) */
        .menu-overlay {
            position: relative;
        }

        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(14, 28, 18, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
            overflow-y: auto;
            color: #ffefc0;
            text-shadow: 2px 2px 0 #3a2a1a;
        }

        .menu-screen h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #fdcc8a, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            margin-bottom: 10px;
        }

        .character-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            max-width: 900px;
        }

        .character-card {
            background: #2a281bc9;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 15px 12px;
            width: 130px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #dba542;
            box-shadow: 0 8px 0 #6b4c1a;
        }

        .character-card.locked {
            opacity: 0.6;
            filter: grayscale(0.5);
            border-color: #6f6a5a;
            cursor: not-allowed;
        }

        .character-card.selected {
            background: #fdbb44cc;
            border: 3px solid #ffec80;
            box-shadow: 0 0 15px gold;
            transform: scale(1.02);
        }

        .character-card .emoji {
            font-size: 4rem;
        }

        .character-card .name {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .character-card .stats {
            font-size: 0.7rem;
            background: #00000066;
            border-radius: 40px;
            padding: 4px;
            margin-top: 6px;
        }

        .progress {
            font-size: 0.7rem;
            margin-top: 8px;
            background: #0f2b1a;
            border-radius: 50px;
            padding: 4px;
        }

        .start-btn {
            background: #f5a623;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            padding: 12px 40px;
            border-radius: 80px;
            margin-top: 15px;
            color: #2c2b1f;
            box-shadow: 0 8px 0 #9b5e1a;
            transition: 0.05s linear;
            cursor: pointer;
            font-family: inherit;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9b5e1a;
        }

        .info-text {
            margin-top: 12px;
            background: #00000077;
            border-radius: 60px;
            padding: 8px 18px;
            font-size: 0.85rem;
        }

        /* Ergebnis-Popup */
        .result-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #211f16e6;
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 40px;
            text-align: center;
            z-index: 30;
            border: 2px solid gold;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .result-popup h2 {
            font-size: 2.3rem;
        }

        .result-popup button {
            margin-top: 20px;
            background: #ffaa44;
            border: none;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .hide {
            display: none;
        }

        @media (max-width: 900px) {
            .character-card { width: 110px; }
            .character-card .emoji { font-size: 3rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="menu-overlay" style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="1100" height="650" style="width:100%; height:auto; max-width:1100px; aspect-ratio:1100/650"></canvas>
        
        <!-- Hauptmenü -->
        <div id="mainMenu" class="menu-screen">
            <h1>⚡ BRAWL ARENA ⚡</h1>
            <p style="margin-bottom: 5px;">Wähle deinen BRAWLER</p>
            <div id="characterContainer" class="character-grid"></div>
            <button id="startBattleBtn" class="start-btn">🔥 STARTE KAMPF 🔥</button>
            <div class="info-text">
                🏆 3 SIEGE mit einem Helden schalten den nächsten frei!<br>
                🎮 WASD bewegen | Maus zielen + Linksklick schießen | Überlebe als Letzter!
            </div>
        </div>

        <!-- Ergebnis-Popup (Sieg/Niederlage) -->
        <div id="resultPopup" class="result-popup hide">
            <h2 id="resultTitle">⚔️ SIEG ⚔️</h2>
            <p id="resultMessage">Du hast die Arena gemeistert!</p>
            <button id="closeResultBtn">ZURÜCK ZUM MENÜ</button>
        </div>
    </div>
</div>

<script>
    // ---------- CHARAKTERE (7 Brawler) ----------
    const CHARACTERS = [
        { id: 0, name: "SHELLY", emoji: "🤠", health: 100, speed: 320, damage: 38, cooldown: 420, color: "#F5A65B", projectileColor: "#FFB347", desc: "Schrotflinte" },
        { id: 1, name: "COLT", emoji: "🔫", health: 88, speed: 340, damage: 32, cooldown: 380, color: "#C9AE5D", projectileColor: "#FFE55C", desc: "Schnellfeuer" },
        { id: 2, name: "BULL", emoji: "🐂", health: 130, speed: 280, damage: 44, cooldown: 480, color: "#B55B3A", projectileColor: "#E07A3A", desc: "Panzer" },
        { id: 3, name: "BROCK", emoji: "🚀", health: 92, speed: 300, damage: 48, cooldown: 550, color: "#DD7744", projectileColor: "#FF7F2A", desc: "Raketen" },
        { id: 4, name: "LEON", emoji: "🍃", health: 85, speed: 360, damage: 36, cooldown: 400, color: "#6BCB77", projectileColor: "#9AE6B4", desc: "Assassine" },
        { id: 5, name: "EMZ", emoji: "💄", health: 96, speed: 310, damage: 34, cooldown: 440, color: "#C8559B", projectileColor: "#E58EBF", desc: "Spray" },
        { id: 6, name: "SPIKE", emoji: "🌵", health: 104, speed: 315, damage: 40, cooldown: 450, color: "#A9D651", projectileColor: "#D0F274", desc: "Kaktus" }
    ];

    // Fortschritt: Anzahl Siege pro Charakter (Index) -> localStorage
    let winsPerCharacter = new Array(CHARACTERS.length).fill(0);
    let unlockedCharacters = [true]; // erster ist frei, andere false
    let currentSelectedCharId = 0;

    // Spiel-Status
    let gameMode = "menu"; // "menu" oder "playing"
    let gameActive = false;
    let animationId = null;
    let gameLoopId = null;

    // Canvas-Elemente
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mainMenuDiv = document.getElementById('mainMenu');
    const resultPopup = document.getElementById('resultPopup');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const closeResultBtn = document.getElementById('closeResultBtn');

    // ----- Spielvariablen (werden beim Start initialisiert) -----
    let player = null;
    let enemies = [];
    let projectiles = [];
    let score = 0; // Siege zählen nicht hier, sondern rundenergebnis
    let lastShotTime = 0;
    let lastTimestamp = 0;
    let currentCharacter = null;

    // Eingaben
    const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    let mouseX = canvas.width/2, mouseY = canvas.height/2;
    
    // Gegner Parameter
    const ENEMY_BASE_HEALTH = 78;
    const ENEMY_RADIUS = 22;
    const ENEMY_SPEED = 155;
    const ENEMY_DAMAGE = 14;
    const INVINCIBLE_DURATION = 0.65;
    let spawnAccumulator = 0;
    const SPAWN_INTERVAL = 2.2;
    const MAX_ENEMIES = 6;
    
    // Kampf-Ergebnis
    let roundResult = null; // "win", "lose"

    // ----- Hilfsfunktionen für Speicherung -----
    function loadProgress() {
        const stored = localStorage.getItem('brawlWinsArray');
        if(stored) {
            try{
                let arr = JSON.parse(stored);
                if(arr.length === CHARACTERS.length) winsPerCharacter = arr;
            }catch(e){}
        }
        // unlocked berechnen: Charakter 0 immer unlocked; Charakter i unlocked wenn winsPerCharacter[i-1] >= 3 (für i>=1)
        for(let i=1; i<CHARACTERS.length; i++) {
            if(winsPerCharacter[i-1] >= 3) unlockedCharacters[i] = true;
            else unlockedCharacters[i] = false;
        }
        // falls wins schon 3 für letzten, alle danach unlocked
        for(let i=1; i<CHARACTERS.length; i++) {
            if(unlockedCharacters[i-1] && winsPerCharacter[i-1] >= 3) unlockedCharacters[i] = true;
        }
        // Sicherstellen mindestens erster unlocked
        unlockedCharacters[0] = true;
    }

    function saveProgress() {
        localStorage.setItem('brawlWinsArray', JSON.stringify(winsPerCharacter));
        // danach unlocked neu berechnen
        for(let i=1; i<CHARACTERS.length; i++) {
            if(winsPerCharacter[i-1] >= 3) unlockedCharacters[i] = true;
        }
    }

    // Sieg für aktuell ausgewählten Charakter hinzufügen (nach gewonnener Runde)
    function addWinToCurrentCharacter() {
        if(currentSelectedCharId !== undefined && currentSelectedCharId >=0) {
            winsPerCharacter[currentSelectedCharId]++;
            saveProgress();
            // Prüfen ob dadurch neue Charaktere freigeschaltet werden
            if(currentSelectedCharId+1 < CHARACTERS.length && winsPerCharacter[currentSelectedCharId] >= 3) {
                unlockedCharacters[currentSelectedCharId+1] = true;
            }
            // auch rekursive freischaltung? maximal nächster
            renderCharacterSelection();
        }
    }

    // ----- Rendering des Charakter-Menüs -----
    function renderCharacterSelection() {
        const container = document.getElementById('characterContainer');
        if(!container) return;
        container.innerHTML = '';
        for(let i=0; i<CHARACTERS.length; i++) {
            const ch = CHARACTERS[i];
            const unlocked = unlockedCharacters[i];
            const wins = winsPerCharacter[i];
            const needed = 3;
            const remaining = Math.max(0, needed - wins);
            const card = document.createElement('div');
            card.className = `character-card ${!unlocked ? 'locked' : ''} ${currentSelectedCharId === i ? 'selected' : ''}`;
            if(unlocked) {
                card.onclick = () => {
                    if(gameMode === "menu") {
                        currentSelectedCharId = i;
                        renderCharacterSelection();
                    }
                };
            } else {
                card.onclick = null;
            }
            card.innerHTML = `
                <div class="emoji">${ch.emoji}</div>
                <div class="name">${ch.name}</div>
                <div class="stats">❤️ ${ch.health} | ⚡${ch.speed} | 💥${ch.damage}</div>
                <div class="progress">${unlocked ? (wins>=3 ? "🏆 FREIGESCHALTET" : `🏅 ${wins}/3 Siege` ) : `🔒 ${remaining} Siege nötig`}</div>
            `;
            container.appendChild(card);
        }
    }

    // ----- Spielinitialisierung (Start der Runde)-----
    function startBattle() {
        if(!unlockedCharacters[currentSelectedCharId]) {
            alert("Dieser Held ist noch nicht freigeschaltet!");
            return;
        }
        gameMode = "playing";
        mainMenuDiv.classList.add('hide');
        resultPopup.classList.add('hide');
        gameActive = true;
        roundResult = null;
        
        // Charakterdaten übernehmen
        currentCharacter = { ...CHARACTERS[currentSelectedCharId] };
        // Spieler erstellen
        player = {
            x: canvas.width/2,
            y: canvas.height/2,
            radius: 20,
            health: currentCharacter.health,
            maxHealth: currentCharacter.health,
            speed: currentCharacter.speed,
            damage: currentCharacter.damage,
            cooldown: currentCharacter.cooldown,
            invincibleUntil: 0,
            knockback: { x: 0, y: 0 }
        };
        
        // Gegner & Projektile leeren
        enemies = [];
        projectiles = [];
        lastShotTime = performance.now();
        spawnAccumulator = 0;
        
        // 4 Startgegner
        for(let i=0; i<4; i++) {
            spawnEnemyInBattle();
        }
        
        // Mausposition zurücksetzen
        mouseX = player.x;
        mouseY = player.y;
    }
    
    function spawnEnemyInBattle() {
        let side = Math.floor(Math.random() * 4);
        let x, y;
        const pad = 45;
        if(side === 0){ x = Math.random() * (canvas.width-2*pad)+pad; y = -ENEMY_RADIUS; }
        else if(side === 2){ x = Math.random() * (canvas.width-2*pad)+pad; y = canvas.height+ENEMY_RADIUS; }
        else if(side === 1){ x = canvas.width+ENEMY_RADIUS; y = Math.random()*(canvas.height-2*pad)+pad; }
        else { x = -ENEMY_RADIUS; y = Math.random()*(canvas.height-2*pad)+pad; }
        x = Math.min(Math.max(x, ENEMY_RADIUS), canvas.width - ENEMY_RADIUS);
        y = Math.min(Math.max(y, ENEMY_RADIUS), canvas.height - ENEMY_RADIUS);
        // Vermeide zu nah am Spieler
        let dx = x - player.x, dy = y - player.y;
        if(Math.hypot(dx,dy) < 130) {
            x = Math.min(Math.max(x + (dx>0?80:-80), ENEMY_RADIUS), canvas.width-ENEMY_RADIUS);
            y = Math.min(Math.max(y + (dy>0?80:-80), ENEMY_RADIUS), canvas.height-ENEMY_RADIUS);
        }
        enemies.push({
            x:x, y:y, radius: ENEMY_RADIUS, health: ENEMY_BASE_HEALTH, maxHealth: ENEMY_BASE_HEALTH
        });
    }
    
    // Schuss
    function shootProjectile(now) {
        if(!gameActive) return false;
        if(now - lastShotTime < currentCharacter.cooldown) return false;
        let dirX = mouseX - player.x;
        let dirY = mouseY - player.y;
        let len = Math.hypot(dirX, dirY);
        if(len<0.001) { dirX=1; len=1; }
        dirX /= len; dirY /= len;
        projectiles.push({
            x: player.x, y: player.y, radius: 8, vx: dirX * 780, vy: dirY * 780,
            damage: currentCharacter.damage, life: true, createdAt: now
        });
        lastShotTime = now;
        return true;
    }
    
    function damagePlayer(amount, now) {
        if(!gameActive) return;
        if(now < player.invincibleUntil) return;
        player.health -= amount;
        if(player.health <= 0) {
            player.health = 0;
            gameActive = false;
            roundResult = "lose";
        }
        player.invincibleUntil = now + (INVINCIBLE_DURATION * 1000);
    }
    
    // Update Movement & Kollisionen
    function updateBattle(deltaSec, now) {
        if(!gameActive) return;
        // Bewegung
        let moveX=0, moveY=0;
        if(keys.w || keys.ArrowUp) moveY-=1;
        if(keys.s || keys.ArrowDown) moveY+=1;
        if(keys.a || keys.ArrowLeft) moveX-=1;
        if(keys.d || keys.ArrowRight) moveX+=1;
        if(moveX!==0 || moveY!==0) {
            let len = Math.hypot(moveX,moveY);
            moveX/=len; moveY/=len;
            player.x += moveX * player.speed * deltaSec;
            player.y += moveY * player.speed * deltaSec;
        }
        if(player.knockback.x !==0 || player.knockback.y !==0) {
            player.x += player.knockback.x * deltaSec;
            player.y += player.knockback.y * deltaSec;
            player.knockback.x *= 0.85;
            player.knockback.y *= 0.85;
            if(Math.abs(player.knockback.x)<3 && Math.abs(player.knockback.y)<3) player.knockback = {x:0,y:0};
        }
        player.x = Math.min(Math.max(player.x, player.radius), canvas.width - player.radius);
        player.y = Math.min(Math.max(player.y, player.radius), canvas.height - player.radius);
        
        // Gegner KI
        for(let e of enemies) {
            let dx = player.x - e.x, dy = player.y - e.y;
            let dist = Math.hypot(dx,dy);
            if(dist>0.01) {
                let move = ENEMY_SPEED * deltaSec;
                e.x += (dx/dist)*move;
                e.y += (dy/dist)*move;
            }
            e.x = Math.min(Math.max(e.x, e.radius), canvas.width - e.radius);
            e.y = Math.min(Math.max(e.y, e.radius), canvas.height - e.radius);
        }
        // Gegner untereinander
        for(let i=0;i<enemies.length;i++) {
            for(let j=i+1;j<enemies.length;j++) {
                let a=enemies[i], b=enemies[j];
                let dx=a.x-b.x, dy=a.y-b.y, dist=Math.hypot(dx,dy);
                let minD=a.radius+b.radius;
                if(dist<minD){
                    let angle=Math.atan2(dy,dx), overlap=minD-dist;
                    let pushX=Math.cos(angle)*overlap*0.5, pushY=Math.sin(angle)*overlap*0.5;
                    a.x+=pushX; a.y+=pushY; b.x-=pushX; b.y-=pushY;
                    a.x=Math.min(Math.max(a.x,a.radius),canvas.width-a.radius);
                    a.y=Math.min(Math.max(a.y,a.radius),canvas.height-a.radius);
                    b.x=Math.min(Math.max(b.x,b.radius),canvas.width-b.radius);
                    b.y=Math.min(Math.max(b.y,b.radius),canvas.height-b.radius);
                }
            }
        }
        // Spieler vs Gegner Kollision + Schaden
        for(let e of enemies) {
            let dx=player.x-e.x, dy=player.y-e.y, dist=Math.hypot(dx,dy);
            let minD=player.radius+e.radius;
            if(dist<minD){
                let angle=Math.atan2(dy,dx), overlap=minD-dist;
                player.x+=Math.cos(angle)*overlap;
                player.y+=Math.sin(angle)*overlap;
                player.knockback.x+=Math.cos(angle)*220;
                player.knockback.y+=Math.sin(angle)*220;
                damagePlayer(ENEMY_DAMAGE, now);
                if(player.health<=0) gameActive=false;
                e.x-=Math.cos(angle)*(overlap+5);
                e.y-=Math.sin(angle)*(overlap+5);
                e.x=Math.min(Math.max(e.x,e.radius),canvas.width-e.radius);
                e.y=Math.min(Math.max(e.y,e.radius),canvas.height-e.radius);
            }
        }
        // Projektile
        for(let i=0;i<projectiles.length;i++){
            let p=projectiles[i];
            p.x+=p.vx*deltaSec;
            p.y+=p.vy*deltaSec;
            if(p.x+p.radius<0 || p.x-p.radius>canvas.width || p.y+p.radius<0 || p.y-p.radius>canvas.height){
                projectiles.splice(i,1); i--; continue;
            }
        }
        // Projektil vs Gegner
        for(let i=0;i<projectiles.length;i++){
            let p=projectiles[i];
            let hit=false;
            for(let j=0;j<enemies.length;j++){
                let e=enemies[j];
                if(Math.hypot(p.x-e.x, p.y-e.y) < p.radius+e.radius){
                    e.health -= p.damage;
                    hit=true;
                    if(e.health<=0){
                        enemies.splice(j,1);
                    }
                    break;
                }
            }
            if(hit){
                projectiles.splice(i,1);
                i--;
            }
        }
        // Spawn Gegner
        if(enemies.length < MAX_ENEMIES && gameActive){
            spawnAccumulator += deltaSec;
            if(spawnAccumulator >= SPAWN_INTERVAL){
                spawnEnemyInBattle();
                spawnAccumulator = 0;
            }
        } else spawnAccumulator=0;
        
        // Siegprüfung: keine Gegner mehr
        if(enemies.length === 0 && gameActive){
            gameActive = false;
            roundResult = "win";
        }
        if(player.health <= 0){
            gameActive = false;
            roundResult = "lose";
        }
    }
    
    // Zeichnung Spiel (während Kampf)
    function drawBattle() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#68b84c";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        // Muster
        ctx.strokeStyle = "#89dd66";
        for(let i=0;i<200;i++){
            ctx.beginPath();
            let rx = (i*173)%canvas.width, ry = (i*257)%canvas.height;
            ctx.moveTo(rx,ry); ctx.lineTo(rx+5, ry-7); ctx.stroke();
        }
        // Gegner
        for(let e of enemies){
            ctx.shadowBlur=5;
            ctx.beginPath(); ctx.arc(e.x,e.y,e.radius-2,0,Math.PI*2); ctx.fillStyle="#cd4c2c"; ctx.fill();
            ctx.beginPath(); ctx.arc(e.x,e.y,e.radius-5,0,Math.PI*2); ctx.fillStyle="#e27c58"; ctx.fill();
            ctx.fillStyle="white";
            ctx.beginPath(); ctx.arc(e.x-7,e.y-6,4,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x+7,e.y-6,4,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#3a241a"; ctx.beginPath(); ctx.arc(e.x-6,e.y-7,2,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.x+8,e.y-7,2,0,Math.PI*2); ctx.fill();
            let hpPercent = e.health/e.maxHealth;
            ctx.fillStyle="#631c0c"; ctx.fillRect(e.x-18, e.y-e.radius-8, 36, 6);
            ctx.fillStyle="#f7b05e"; ctx.fillRect(e.x-18, e.y-e.radius-8, 36*hpPercent, 6);
        }
        // Spieler
        ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(player.x,player.y,player.radius-1,0,Math.PI*2); ctx.fillStyle=currentCharacter.color; ctx.fill();
        ctx.beginPath(); ctx.arc(player.x,player.y,player.radius-4,0,Math.PI*2); ctx.fillStyle="#FFDD99"; ctx.fill();
        let angleM=Math.atan2(mouseY-player.y, mouseX-player.x);
        let eyeX1=player.x+Math.cos(angleM-0.5)*7, eyeY1=player.y+Math.sin(angleM-0.5)*5;
        let eyeX2=player.x+Math.cos(angleM+0.5)*7, eyeY2=player.y+Math.sin(angleM+0.5)*5;
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(eyeX1,eyeY1,4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeX2,eyeY2,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#2f2b1f"; ctx.beginPath(); ctx.arc(eyeX1+1,eyeY1-1,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeX2+1,eyeY2-1,2,0,Math.PI*2); ctx.fill();
        // Healthbalken
        let hpPercentP = player.health/player.maxHealth;
        ctx.fillStyle="#631010"; ctx.fillRect(player.x-24, player.y-player.radius-12, 48, 8);
        ctx.fillStyle="#ff6e6e"; ctx.fillRect(player.x-24, player.y-player.radius-12, 48*hpPercentP, 8);
        // Projektil
        for(let p of projectiles){
            ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fillStyle=currentCharacter.projectileColor; ctx.fill();
            ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fillStyle="#ffda88"; ctx.fill();
        }
        ctx.shadowBlur=0;
    }
    
    // Ergebnis anzeigen & zurück zum Menü
    function endRound() {
        if(roundResult === "win") {
            resultTitle.innerText = "🏆 SIEG! 🏆";
            resultMessage.innerText = `Du hast die Arena erobert! +1 Sieg für ${CHARACTERS[currentSelectedCharId].name}`;
            addWinToCurrentCharacter();
        } else {
            resultTitle.innerText = "💀 NIEDERLAGE 💀";
            resultMessage.innerText = "Du wurdest besiegt. Versuche es noch einmal!";
        }
        resultPopup.classList.remove('hide');
        gameMode = "menu";
        gameActive = false;
        // Zeichne Menü neu
        renderCharacterSelection();
        mainMenuDiv.classList.remove('hide');
        if(animationId) cancelAnimationFrame(animationId);
        startMenuDrawLoop(); // einfache Schleife für Hintergrund (Menü anzeigen)
    }
    
    // Zeichnet Menü-Hintergrund (nur Grafik)
    function drawMenuBackground() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#3d7642";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.font = "bold 28px system-ui";
        ctx.fillStyle = "#ffefb0";
        ctx.shadowBlur=0;
        ctx.fillText("⚡ BRAWL ARENA", canvas.width/2-120, 70);
        ctx.font = "18px system-ui";
        ctx.fillStyle = "#d9e68c";
        ctx.fillText("Wähle deinen Helden im Menü", canvas.width/2-130, 130);
    }
    
    let menuDrawId = null;
    function startMenuDrawLoop() {
        if(menuDrawId) cancelAnimationFrame(menuDrawId);
        function drawLoop() {
            if(gameMode === "menu") {
                drawMenuBackground();
                menuDrawId = requestAnimationFrame(drawLoop);
            } else {
                if(menuDrawId) cancelAnimationFrame(menuDrawId);
            }
        }
        drawLoop();
    }
    
    // Game-Loop für aktiven Kampf
    let lastFrame = 0;
    function battleLoop(nowMs) {
        if(gameMode !== "playing") return;
        if(!lastFrame) { lastFrame = nowMs; requestAnimationFrame(battleLoop); return; }
        let delta = Math.min(0.033, (nowMs - lastFrame)/1000);
        if(delta<=0.01) { lastFrame = nowMs; requestAnimationFrame(battleLoop); return; }
        lastFrame = nowMs;
        if(gameActive) {
            updateBattle(delta, nowMs);
        }
        drawBattle();
        if(roundResult !== null && gameMode === "playing") {
            endRound();
            return;
        }
        requestAnimationFrame(battleLoop);
    }
    
    // Events für Maus & Tastatur
    function setupEventListeners() {
        window.addEventListener('keydown', (e) => {
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k]=true;
            if(k === 'arrowup' || k === 'arrowdown' || k === 'arrowleft' || k === 'arrowright' ||
               k === 'w' || k === 's' || k === 'a' || k === 'd') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k]=false;
        });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
            let cx = (e.clientX - rect.left)*sx, cy = (e.clientY - rect.top)*sy;
            mouseX = Math.min(Math.max(cx,0), canvas.width);
            mouseY = Math.min(Math.max(cy,0), canvas.height);
        });
        canvas.addEventListener('mousedown', (e) => {
            if(e.button !== 0) return;
            e.preventDefault();
            if(gameMode === "playing" && gameActive) {
                shootProjectile(performance.now());
            }
        });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        document.getElementById('startBattleBtn').addEventListener('click', () => {
            if(gameMode === "menu") {
                startBattle();
                lastFrame = 0;
                requestAnimationFrame(battleLoop);
            }
        });
        closeResultBtn.addEventListener('click', () => {
            resultPopup.classList.add('hide');
            mainMenuDiv.classList.remove('hide');
            gameMode = "menu";
            renderCharacterSelection();
            startMenuDrawLoop();
        });
    }
    
    // Initialisierung
    function init() {
        loadProgress();
        renderCharacterSelection();
        setupEventListeners();
        startMenuDrawLoop();
    }
    init();
</script>
</body>
</html>
