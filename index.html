<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft Style - First Person | Große Welt, Inventar, Arm + Blockabbau</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Minecraft', 'Courier New', monospace;
        }
        /* Hotbar / Inventar */
        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid #5a5a5a;
            z-index: 30;
            pointer-events: auto;
        }
        .slot {
            width: 64px;
            height: 64px;
            background: rgba(30,30,40,0.9);
            border: 2px solid #8b8b8b;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 black;
        }
        .slot.selected {
            border: 3px solid #ffaa33;
            background: rgba(70,70,90,0.9);
            box-shadow: 0 0 8px gold;
        }
        .slot-icon { font-size: 32px; }
        .slot-count {
            position: absolute;
            bottom: 4px;
            right: 8px;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            border-radius: 10px;
        }
        .slot-name { font-size: 10px; margin-top: 2px; }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            background: rgba(255,255,255,0.2);
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 700px) {
            .slot { width: 48px; height: 48px; }
            .slot-icon { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="hotbar"></div>
    <div id="status">✅ Große Welt geladen | 2 Blöcke groß | Klick zum Starten</div>
    <div id="crosshair"></div>
    <div id="controls-info">
        🖱️ LINKS = Abbauen | RECHTS = Platzieren | 1-9 / Scrollen = Slot | ␣ Springen | W A S D
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Szene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 55, 110);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 120);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Beleuchtung ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        dirLight.position.set(15, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 65;
        dirLight.shadow.camera.left = -18;
        dirLight.shadow.camera.right = 18;
        dirLight.shadow.camera.top = 18;
        dirLight.shadow.camera.bottom = -18;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x5577aa, 0.3);
        fillLight.position.set(0, -5, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.25);
        backLight.position.set(-5, 10, -8);
        scene.add(backLight);

        // --- Block-Definitionen ---
        const BLOCK_TYPES = [
            { id: 0, name: "Gras", color: 0x6b8e23, icon: "🌿", stackable: true },
            { id: 1, name: "Erde", color: 0x8B5A2B, icon: "🟫", stackable: true },
            { id: 2, name: "Holz", color: 0xBC9A6C, icon: "🪵", stackable: true },
            { id: 3, name: "Laub", color: 0x2e8b57, icon: "🍃", stackable: true },
            { id: 4, name: "Stein", color: 0x888888, icon: "🪨", stackable: true },
            { id: 5, name: "Sand", color: 0xEEDD99, icon: "🏜️", stackable: true }
        ];
        
        // --- Inventar (9 Slots) ---
        let inventory = Array(9).fill().map(() => ({ typeId: 0, count: 0 }));
        inventory[0] = { typeId: 0, count: 64 };
        inventory[1] = { typeId: 1, count: 32 };
        inventory[2] = { typeId: 2, count: 32 };
        inventory[3] = { typeId: 4, count: 16 };
        inventory[4] = { typeId: 3, count: 16 };
        
        let selectedSlot = 0;
        
        // --- Welt-Blockverwaltung ---
        let blocks = [];
        const blockSize = 1;
        
        function createBlockMesh(x, y, z, typeId) {
            const blockDef = BLOCK_TYPES[typeId];
            const material = new THREE.MeshStandardMaterial({ color: blockDef.color, roughness: 0.7, metalness: 0.05 });
            const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            return cube;
        }
        
        function addBlockToWorld(x, y, z, typeId) {
            if (y < 0 || y > 25) return false;
            for (let b of blocks) if (b.x === x && b.y === y && b.z === z) return false;
            const mesh = createBlockMesh(x, y, z, typeId);
            scene.add(mesh);
            blocks.push({
                mesh, x, y, z, typeId,
                minX: x - 0.5, maxX: x + 0.5,
                minY: y - 0.5, maxY: y + 0.5,
                minZ: z - 0.5, maxZ: z + 0.5
            });
            return true;
        }
        
        function removeBlockAt(x, y, z) {
            for (let i = 0; i < blocks.length; i++) {
                const b = blocks[i];
                if (b.x === x && b.y === y && b.z === z) {
                    scene.remove(b.mesh);
                    const type = b.typeId;
                    blocks.splice(i,1);
                    return type;
                }
            }
            return null;
        }
        
        function getBlockAt(x, y, z) {
            return blocks.find(b => b.x === x && b.y === y && b.z === z);
        }
        
        // Inventar-Helfer
        function addItemToInventory(typeId, amount) {
            for (let i = 0; i < inventory.length && amount > 0; i++) {
                if (inventory[i].typeId === typeId && inventory[i].count < 64) {
                    let space = 64 - inventory[i].count;
                    let add = Math.min(space, amount);
                    inventory[i].count += add;
                    amount -= add;
                }
            }
            for (let i = 0; i < inventory.length && amount > 0; i++) {
                if (inventory[i].count === 0) {
                    inventory[i].typeId = typeId;
                    let add = Math.min(64, amount);
                    inventory[i].count = add;
                    amount -= add;
                }
            }
            updateHotbarUI();
            updateHandModel();
        }
        
        function removeCurrentItem() {
            const slot = inventory[selectedSlot];
            if (slot.count > 0) {
                slot.count--;
                if (slot.count === 0) slot.typeId = 0;
                updateHotbarUI();
                updateHandModel();
                return slot.typeId;
            }
            return null;
        }
        
        function getCurrentBlockType() {
            const slot = inventory[selectedSlot];
            if (slot.count > 0 && slot.typeId !== undefined) return slot.typeId;
            return null;
        }
        
        // --- UI Hotbar ---
        const hotbarDiv = document.getElementById('hotbar');
        function updateHotbarUI() {
            hotbarDiv.innerHTML = '';
            for (let i = 0; i < inventory.length; i++) {
                const slot = inventory[i];
                const typeDef = slot.typeId !== 0 ? BLOCK_TYPES[slot.typeId] : null;
                const div = document.createElement('div');
                div.className = `slot ${i === selectedSlot ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="slot-icon">${typeDef ? typeDef.icon : '⬜'}</div>
                    <div class="slot-count">${slot.count > 0 ? slot.count : ''}</div>
                    <div class="slot-name">${typeDef ? typeDef.name : 'Leer'}</div>
                `;
                div.addEventListener('click', () => {
                    selectedSlot = i;
                    updateHotbarUI();
                    updateHandModel();
                });
                hotbarDiv.appendChild(div);
            }
        }
        
        // --- HAND MODELL (sichtbarer Arm mit gehaltenem Block) ---
        let handGroup = null;
        function createHandModel() {
            if (handGroup) scene.remove(handGroup);
            handGroup = new THREE.Group();
            // Arm (einfacher Zylinder / Quader)
            const armGeo = new THREE.BoxGeometry(0.35, 0.7, 0.35);
            const armMat = new THREE.MeshStandardMaterial({ color: 0xDDAA88, roughness: 0.4 });
            const arm = new THREE.Mesh(armGeo, armMat);
            arm.position.set(0.45, -0.5, -0.6);
            arm.castShadow = true;
            handGroup.add(arm);
            
            // Hand (kleinerer Würfel)
            const handGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const handMat = new THREE.MeshStandardMaterial({ color: 0xCC9966 });
            const handMesh = new THREE.Mesh(handGeo, handMat);
            handMesh.position.set(0.45, -0.15, -0.9);
            handMesh.castShadow = true;
            handGroup.add(handMesh);
            
            // Block in der Hand (wird je nach selected Slot aktualisiert)
            const blockHolder = new THREE.Group();
            blockHolder.name = "heldBlock";
            blockHolder.position.set(0.45, -0.15, -0.95);
            handGroup.add(blockHolder);
            
            scene.add(handGroup);
            return blockHolder;
        }
        
        let heldBlockGroup = null;
        function updateHandModel() {
            if (!heldBlockGroup) {
                const holder = createHandModel();
                heldBlockGroup = holder;
            } else {
                // Alten Block entfernen
                while(heldBlockGroup.children.length) heldBlockGroup.remove(heldBlockGroup.children[0]);
            }
            const currentType = getCurrentBlockType();
            if (currentType !== null) {
                const blockDef = BLOCK_TYPES[currentType];
                const blockMat = new THREE.MeshStandardMaterial({ color: blockDef.color, roughness: 0.5 });
                const blockMesh = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), blockMat);
                blockMesh.castShadow = true;
                blockMesh.position.set(0, 0, 0);
                heldBlockGroup.add(blockMesh);
            }
        }
        
        // --- Große Welt generieren (40x40, viele Bäume, Hügel) ---
        const groundSize = 44;   // von -22 bis +22 => 44 Blöcke breit
        const half = groundSize / 2;
        
        // 1. Boden mit Höhenvariation (einfache Hügel)
        for (let i = -half; i < half; i++) {
            for (let j = -half; j < half; j++) {
                let height = 0;
                // Simuliere kleine Hügel durch Sinus
                let hill = Math.sin(i * 0.25) * Math.cos(j * 0.25) * 1.2;
                height = Math.floor(hill);
                if (height > 2) height = 2;
                if (height < -1) height = -1;
                // Basisboden auf Y = height
                let type = 0; // Gras
                if (height === 0 && Math.random() < 0.08) type = 1; // Erde
                if (height === 1 && Math.random() < 0.2) type = 4; // Stein auf Hügeln
                addBlockToWorld(i, height, j, type);
                // Falls Höhe > 0, fülle darunter mit Erde/Stein
                for (let k = height-1; k >= -2; k--) {
                    if (!getBlockAt(i, k, j)) {
                        const fillType = (k < -1) ? 4 : 1;
                        addBlockToWorld(i, k, j, fillType);
                    }
                }
            }
        }
        
        // 2. Bäume (viele, vermeiden Startzone um 0,0)
        function isStartArea(x, z) { return Math.abs(x) <= 5 && Math.abs(z) <= 5; }
        function buildTree(tx, tz) {
            if (isStartArea(tx, tz)) return false;
            // Bodenhöhe finden
            let groundY = -2;
            for (let y = 5; y >= -2; y--) {
                if (getBlockAt(tx, y, tz)) { groundY = y+1; break; }
            }
            if (groundY < 0) groundY = 0;
            if (getBlockAt(tx, groundY+1, tz) || getBlockAt(tx, groundY+2, tz)) return false;
            // Stamm
            addBlockToWorld(tx, groundY+1, tz, 2);
            addBlockToWorld(tx, groundY+2, tz, 2);
            addBlockToWorld(tx, groundY+3, tz, 2);
            // Laub
            const leaf = 3;
            addBlockToWorld(tx, groundY+4, tz, leaf);
            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    if (Math.abs(dx)+Math.abs(dz) <= 2) addBlockToWorld(tx+dx, groundY+4, tz+dz, leaf);
                }
            }
            addBlockToWorld(tx, groundY+5, tz, leaf);
            addBlockToWorld(tx+1, groundY+5, tz, leaf);
            addBlockToWorld(tx-1, groundY+5, tz, leaf);
            addBlockToWorld(tx, groundY+5, tz+1, leaf);
            addBlockToWorld(tx, groundY+5, tz-1, leaf);
            return true;
        }
        
        for (let i = 0; i < 140; i++) {
            const x = Math.floor(Math.random() * (groundSize-8)) - (half-4);
            const z = Math.floor(Math.random() * (groundSize-8)) - (half-4);
            buildTree(x, z);
        }
        
        // 3. Steine und Erzvorkommen (Stein an der Oberfläche)
        for (let i = 0; i < 300; i++) {
            const x = Math.floor(Math.random() * (groundSize-4)) - (half-2);
            const z = Math.floor(Math.random() * (groundSize-4)) - (half-2);
            if (isStartArea(x, z)) continue;
            let y = -1;
            for (let yy = 3; yy >= -1; yy--) if (getBlockAt(x, yy, z)) { y = yy+1; break; }
            if (y > 0 && !getBlockAt(x, y, z) && Math.random() < 0.3) {
                addBlockToWorld(x, y, z, 4);
            }
        }
        
        // 4. Kleiner See
        const lakeX = 11, lakeZ = -9;
        for (let dx = -3; dx <= 3; dx++) {
            for (let dz = -3; dz <= 3; dz++) {
                if (Math.abs(dx)+Math.abs(dz) <= 3.5) {
                    const wx = lakeX + dx, wz = lakeZ + dz;
                    for (let yy = 2; yy >= -1; yy--) {
                        const block = getBlockAt(wx, yy, wz);
                        if (block && block.y >= 0) {
                            removeBlockAt(wx, yy, wz);
                        }
                    }
                    const waterMat = new THREE.MeshStandardMaterial({ color: 0x3b9eff, roughness: 0.3, metalness: 0.7, emissive: 0x004466 });
                    const waterGeom = new THREE.BoxGeometry(blockSize, 0.6, blockSize);
                    const waterBlock = new THREE.Mesh(waterGeom, waterMat);
                    waterBlock.position.set(wx, 0.3, wz);
                    waterBlock.castShadow = true;
                    scene.add(waterBlock);
                    blocks.push({
                        mesh: waterBlock, x: wx, y: 0.3, z: wz, typeId: 99,
                        minX: wx-0.5, maxX: wx+0.5, minY: 0.0, maxY: 0.9, minZ: wz-0.5, maxZ: wz+0.5
                    });
                }
            }
        }
        
        // --- Spieler (2 Blöcke groß, 1.62 Augen Höhe, Kollisionsbox 1.8 hoch) ---
        let playerPos = new THREE.Vector3(0, 1.62, 0);
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        const playerHeight = 1.62;
        const playerRadius = 0.35;
        const GRAVITY = 25.0;
        const JUMP_POWER = 8.5;
        
        function collidesWithBlocks(posX, posZ, posY) {
            const minX = posX - playerRadius;
            const maxX = posX + playerRadius;
            const minZ = posZ - playerRadius;
            const maxZ = posZ + playerRadius;
            const minY = posY - 0.9;
            const maxY = posY + 0.9;
            for (let b of blocks) {
                if (maxX > b.minX && minX < b.maxX &&
                    maxY > b.minY && minY < b.maxY &&
                    maxZ > b.minZ && minZ < b.maxZ) {
                    return true;
                }
            }
            return false;
        }
        
        function isOnGround() {
            const footY = playerPos.y - 0.9 - 0.05;
            return collidesWithBlocks(playerPos.x, playerPos.z, footY + 0.9);
        }
        
        function tryMoveXZ(deltaX, deltaZ) {
            let newX = playerPos.x, newZ = playerPos.z;
            if (deltaX !== 0) {
                newX = playerPos.x + deltaX;
                if (!collidesWithBlocks(newX, playerPos.z, playerPos.y)) playerPos.x = newX;
            }
            if (deltaZ !== 0) {
                newZ = playerPos.z + deltaZ;
                if (!collidesWithBlocks(playerPos.x, newZ, playerPos.y)) playerPos.z = newZ;
            }
        }
        
        function tryMoveY(deltaY) {
            let newY = playerPos.y + deltaY;
            if (!collidesWithBlocks(playerPos.x, playerPos.z, newY)) {
                playerPos.y = newY;
                return true;
            } else {
                if (deltaY < 0) {
                    playerVelocity.y = 0;
                    while (!collidesWithBlocks(playerPos.x, playerPos.z, playerPos.y - 0.01) && playerPos.y > 0.2) playerPos.y -= 0.01;
                } else if (deltaY > 0) playerVelocity.y = 0;
                return false;
            }
        }
        
        function jump() { if (isOnGround()) playerVelocity.y = JUMP_POWER; }
        
        // --- Maus- und Tastatursteuerung (W = vorwärts) ---
        let mouseLocked = false;
        let yaw = -Math.PI / 4;
        let pitch = 0;
        const moveSpeed = 5.8;
        const keyState = { KeyW: false, KeyS: false, KeyA: false, KeyD: false, Space: false };
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); jump(); }
            if (keyState.hasOwnProperty(e.code)) keyState[e.code] = true;
            if (e.code >= 'Digit1' && e.code <= 'Digit9') {
                const idx = parseInt(e.code.slice(-1)) - 1;
                if (idx >= 0 && idx < 9) { selectedSlot = idx; updateHotbarUI(); updateHandModel(); }
                e.preventDefault();
            }
            if (e.code === 'Escape' && mouseLocked) document.exitPointerLock();
        });
        window.addEventListener('keyup', (e) => {
            if (keyState.hasOwnProperty(e.code)) keyState[e.code] = false;
        });
        
        const canvas = renderer.domElement;
        canvas.addEventListener('click', () => canvas.requestPointerLock());
        document.addEventListener('pointerlockchange', lockChange);
        function lockChange() {
            if (document.pointerLockElement === canvas) {
                mouseLocked = true;
                document.getElementById('status').innerHTML = "🎮 Maus gesperrt | WASD + Maus | 2 Blöcke groß";
                document.addEventListener('mousemove', onMouseMove);
            } else {
                mouseLocked = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.getElementById('status').innerHTML = "⏸ Maus entsperrt | Klick zum Fortfahren";
            }
        }
        function onMouseMove(e) {
            if (!mouseLocked) return;
            const sens = 0.0022;
            yaw -= e.movementX * sens;
            pitch -= e.movementY * sens;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
        }
        
        // --- Raycaster für Blockabbau/Platzierung ---
        const raycaster = new THREE.Raycaster();
        const hitDistance = 5.2;
        
        function getLookedBlock() {
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            raycaster.set(camera.position, direction);
            const intersects = raycaster.intersectObjects(blocks.map(b => b.mesh));
            if (intersects.length > 0 && intersects[0].distance <= hitDistance) {
                const hitMesh = intersects[0].object;
                return blocks.find(b => b.mesh === hitMesh);
            }
            return null;
        }
        
        function breakBlock() {
            const block = getLookedBlock();
            if (!block) return;
            if (block.typeId === 99) return; // Wasser nicht abbauen
            const type = removeBlockAt(block.x, block.y, block.z);
            if (type !== null) addItemToInventory(type, 1);
            // kurze Arm-Animation (optional)
            if (heldBlockGroup) heldBlockGroup.position.z = -0.1;
            setTimeout(() => { if(heldBlockGroup) heldBlockGroup.position.z = 0; }, 100);
        }
        
        function placeBlock() {
            const blockType = getCurrentBlockType();
            if (blockType === null) return;
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            raycaster.set(camera.position, direction);
            const intersects = raycaster.intersectObjects(blocks.map(b => b.mesh));
            if (intersects.length > 0 && intersects[0].distance <= hitDistance) {
                const hit = intersects[0];
                const hitBlock = blocks.find(b => b.mesh === hit.object);
                if (hitBlock) {
                    const normal = hit.face.normal;
                    let newX = hitBlock.x, newY = hitBlock.y, newZ = hitBlock.z;
                    if (normal.x > 0.5) newX += 1;
                    else if (normal.x < -0.5) newX -= 1;
                    else if (normal.y > 0.5) newY += 1;
                    else if (normal.y < -0.5) newY -= 1;
                    else if (normal.z > 0.5) newZ += 1;
                    else if (normal.z < -0.5) newZ -= 1;
                    
                    if (!getBlockAt(newX, newY, newZ)) {
                        // Kollision mit Spieler prüfen
                        const tempBox = { minX: newX-0.5, maxX: newX+0.5, minY: newY-0.5, maxY: newY+0.5, minZ: newZ-0.5, maxZ: newZ+0.5 };
                        const playerMinX = playerPos.x - playerRadius;
                        const playerMaxX = playerPos.x + playerRadius;
                        const playerMinY = playerPos.y - 0.9;
                        const playerMaxY = playerPos.y + 0.9;
                        const playerMinZ = playerPos.z - playerRadius;
                        const playerMaxZ = playerPos.z + playerRadius;
                        const collides = (playerMaxX > tempBox.minX && playerMinX < tempBox.maxX &&
                                          playerMaxY > tempBox.minY && playerMinY < tempBox.maxY &&
                                          playerMaxZ > tempBox.minZ && playerMinZ < tempBox.maxZ);
                        if (!collides) {
                            const removed = removeCurrentItem();
                            if (removed !== null) addBlockToWorld(newX, newY, newZ, blockType);
                            // kurze Arm-Animation
                            if (heldBlockGroup) heldBlockGroup.position.z = -0.1;
                            setTimeout(() => { if(heldBlockGroup) heldBlockGroup.position.z = 0; }, 100);
                        }
                    }
                }
            }
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (!mouseLocked) return;
            e.preventDefault();
            if (e.button === 0) breakBlock();
            else if (e.button === 2) placeBlock();
        });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        window.addEventListener('wheel', (e) => {
            if (!mouseLocked) return;
            e.preventDefault();
            if (e.deltaY > 0) selectedSlot = (selectedSlot + 1) % 9;
            else selectedSlot = (selectedSlot - 1 + 9) % 9;
            updateHotbarUI();
            updateHandModel();
        });
        
        // --- Bewegung & Schwerkraft (pro Frame) ---
        let lastTime = performance.now();
        function updateMovement(deltaSec) {
            if (!mouseLocked) return;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).normalize();
            let move = new THREE.Vector3(0,0,0);
            if (keyState.KeyW) move.add(forward);
            if (keyState.KeyS) move.sub(forward);
            if (keyState.KeyD) move.add(right);
            if (keyState.KeyA) move.sub(right);
            if (move.length() > 0) move.normalize();
            const speed = moveSpeed * deltaSec;
            tryMoveXZ(move.x * speed, move.z * speed);
            
            if (!isOnGround()) playerVelocity.y -= GRAVITY * deltaSec;
            else { if (playerVelocity.y < 0) playerVelocity.y = 0; }
            tryMoveY(playerVelocity.y * deltaSec);
            
            camera.position.copy(playerPos);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }
        
        // --- Dekoration: Partikel & Glühwürmchen ---
        const particleCount = 600;
        const particleGeom = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 110;
            particlePositions[i*3+1] = Math.random() * 15;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 100;
        }
        particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.08, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeom, particleMat);
        scene.add(particles);
        
        const fireflies = [];
        for (let i = 0; i < 100; i++) {
            const fly = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0x442200 }));
            fly.userData = { x: (Math.random()-0.5)*70, z: (Math.random()-0.5)*70, y: Math.random()*6+1 };
            fly.position.set(fly.userData.x, fly.userData.y, fly.userData.z);
            scene.add(fly);
            fireflies.push(fly);
        }
        
        // --- Animationsloop ---
        let prevTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - prevTime) / 1000);
            prevTime = now;
            if (delta < 0.001) delta = 0.016;
            updateMovement(delta);
            
            particles.rotation.y += 0.0015;
            backLight.intensity = 0.28 + Math.sin(Date.now() * 0.002) * 0.07;
            for (let f of fireflies) {
                f.position.y += Math.sin(Date.now() * 2.5 + f.userData.x) * 0.01;
                f.position.x += Math.sin(Date.now() * 1.2 + f.userData.z) * 0.004;
                f.position.z += Math.cos(Date.now() * 1.1 + f.userData.x) * 0.004;
                if (Math.abs(f.position.x) > 55) f.position.x *= -0.95;
                if (Math.abs(f.position.z) > 55) f.position.z *= -0.95;
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        updateHotbarUI();
        createHandModel();
        updateHandModel();
        
        // Startposition sichern (falls blockiert)
        if (collidesWithBlocks(playerPos.x, playerPos.z, playerPos.y)) {
            playerPos.set(0, 2.2, 0);
            while (collidesWithBlocks(playerPos.x, playerPos.z, playerPos.y) && playerPos.y < 5) playerPos.y += 0.2;
            camera.position.copy(playerPos);
        }
        
        animate();
    </script>
</body>
</html>
