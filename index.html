<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brawl Stars Style - Arena Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: #2b5e2f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            background-color: #5c9e3e;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 8px;
            padding: 10px 25px;
            background: #1f3b24c9;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            color: #f9e7b3;
            text-shadow: 2px 2px 0 #5a3e1a;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 35px;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .stats span {
            background: #00000066;
            padding: 5px 18px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .restart-btn {
            background: #fdbb44;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 8px 28px;
            border-radius: 60px;
            cursor: pointer;
            color: #2f2e1f;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #9b6a1a;
            font-family: inherit;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9b6a1a;
        }

        .controls-hint {
            margin-top: 12px;
            background: #00000077;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            color: #ffefb9;
            backdrop-filter: blur(4px);
            display: inline-block;
            width: auto;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        @media (max-width: 1100px) {
            .stats span { font-size: 1.2rem; padding: 4px 12px; }
            .restart-btn { font-size: 1.1rem; padding: 5px 20px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1100" height="650" style="width:100%; height:auto; max-width:1100px; aspect-ratio:1100/650"></canvas>
        <div class="info-panel">
            <div class="stats">
                <span>🏆 SCORE: <span id="scoreValue">0</span></span>
                <span>❤️ LEBEN: <span id="healthValue">100</span>%</span>
            </div>
            <button class="restart-btn" id="restartButton">⚡ NEUES SPIEL</button>
        </div>
        <div class="footer">
            <div class="controls-hint">
                🎮 WASD → bewegen &nbsp;&nbsp;|&nbsp;&nbsp; 🖱️ MAUSKLICK (links) → SCHIESSEN &nbsp;&nbsp;|&nbsp;&nbsp; 💥 Gegner jagen dich!
            </div>
            <div class="controls-hint">
                ⚡ Brawl-Stars Style | 2 Treffer pro Gegner
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- CANVAS ELEMENTE -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ----- SPIELPARAMETER -----
        let gameActive = true;
        let animationId = null;
        
        // Spieler
        const PLAYER_MAX_HEALTH = 100;
        let player = {
            x: canvas.width/2,
            y: canvas.height/2,
            radius: 20,
            health: PLAYER_MAX_HEALTH,
            speed: 330,        // Pixel pro Sekunde
            invincibleUntil: 0, // timestamp (ms)
            knockback: { x: 0, y: 0 }   // temporärer Rückstoß
        };
        
        // Dynamische Arrays
        let enemies = [];
        let projectiles = [];
        
        // Spielstatistiken
        let score = 0;
        let highScore = localStorage.getItem('brawlStarsHigh') ? parseInt(localStorage.getItem('brawlStarsHigh')) : 0;
        
        // Mausposition (für Schussrichtung & visuelle Drehung)
        let mouseX = canvas.width/2;
        let mouseY = canvas.height/2;
        let mouseInside = true;
        
        // Schuss-Cooldown
        let lastShotTime = 0;
        const SHOT_COOLDOWN_MS = 380;   // ähnlich Brawl Stars (0.38 Sekunden)
        const PROJECTILE_SPEED = 750;    // Pixel/Sek
        const PROJECTILE_RADIUS = 8;
        const PROJECTILE_DAMAGE = 38;     // Gegner HP sind 75 -> 2 Treffer (75 -> 2*38=76)
        
        // Gegner Stats
        const ENEMY_BASE_HEALTH = 75;
        const ENEMY_RADIUS = 22;
        const ENEMY_SPEED = 155;          // etwas langsamer als Spieler
        const ENEMY_DAMAGE = 14;           // Schaden pro Kollision
        const INVINCIBLE_DURATION = 0.65;  // Sekunden unverwundbar nach Treffer
        
        // Spawn-Management
        let spawnAccumulator = 0;
        const SPAWN_DELAY = 1.7;           // Sekunden zwischen Spawns
        const MAX_ENEMIES = 9;
        
        // Eingabezustände (Tastatur)
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        // Hilfsvariablen für DeltaTime
        let lastTimestamp = 0;
        
        // ----- INITIALE GEGNER (3 Stück) -----
        function spawnEnemy(avoidPlayer = true) {
            if (!gameActive && enemies.length > 10) return;
            let side = Math.floor(Math.random() * 4);
            let x, y;
            const padding = 45;
            if (side === 0) { // oben
                x = Math.random() * (canvas.width - 2*padding) + padding;
                y = -ENEMY_RADIUS;
            } else if (side === 2) { // unten
                x = Math.random() * (canvas.width - 2*padding) + padding;
                y = canvas.height + ENEMY_RADIUS;
            } else if (side === 1) { // rechts
                x = canvas.width + ENEMY_RADIUS;
                y = Math.random() * (canvas.height - 2*padding) + padding;
            } else {
                x = -ENEMY_RADIUS;
                y = Math.random() * (canvas.height - 2*padding) + padding;
            }
            
            // Grenzen abfangen falls außerhalb => in gültigen Bereich korrigieren
            x = Math.min(Math.max(x, ENEMY_RADIUS), canvas.width - ENEMY_RADIUS);
            y = Math.min(Math.max(y, ENEMY_RADIUS), canvas.height - ENEMY_RADIUS);
            
            // Vermeide zu nahes Spawnen am Spieler
            if (avoidPlayer) {
                let dx = x - player.x;
                let dy = y - player.y;
                let dist = Math.hypot(dx, dy);
                if (dist < 150) {
                    x = Math.min(Math.max(x + (dx > 0 ? 100 : -100), ENEMY_RADIUS), canvas.width - ENEMY_RADIUS);
                    y = Math.min(Math.max(y + (dy > 0 ? 100 : -100), ENEMY_RADIUS), canvas.height - ENEMY_RADIUS);
                }
            }
            
            enemies.push({
                x: x,
                y: y,
                radius: ENEMY_RADIUS,
                health: ENEMY_BASE_HEALTH,
                maxHealth: ENEMY_BASE_HEALTH
            });
        }
        
        // ----- SPIEL ZURÜCKSETZEN -----
        function resetGame() {
            gameActive = true;
            // Spieler zurücksetzen
            player = {
                x: canvas.width/2,
                y: canvas.height/2,
                radius: 20,
                health: PLAYER_MAX_HEALTH,
                speed: 330,
                invincibleUntil: 0,
                knockback: { x: 0, y: 0 }
            };
            // Leere Arrays
            enemies = [];
            projectiles = [];
            score = 0;
            updateScoreUI();
            updateHealthUI();
            
            lastShotTime = performance.now();
            spawnAccumulator = 0;
            
            // 3 Startgegner
            for(let i = 0; i < 3; i++) {
                spawnEnemy(true);
            }
            
            // Mausposition wieder zentrieren
            mouseX = player.x;
            mouseY = player.y;
        }
        
        // ----- UI AKTUALISIEREN -----
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('brawlStarsHigh', highScore);
            }
        }
        
        function updateHealthUI() {
            let percent = Math.max(0, (player.health / PLAYER_MAX_HEALTH) * 100);
            document.getElementById('healthValue').innerText = Math.floor(percent);
        }
        
        // ----- PROJEKTIL FEUERN (in Mausrichtung)-----
        function shootProjectile(now) {
            if (!gameActive) return false;
            if (now - lastShotTime < SHOT_COOLDOWN_MS) return false;
            
            // Richtungsvektor zur Maus
            let dirX = mouseX - player.x;
            let dirY = mouseY - player.y;
            let length = Math.hypot(dirX, dirY);
            if (length < 0.001) {
                dirX = 1; dirY = 0;
                length = 1;
            }
            dirX /= length;
            dirY /= length;
            
            projectiles.push({
                x: player.x,
                y: player.y,
                radius: PROJECTILE_RADIUS,
                vx: dirX * PROJECTILE_SPEED,
                vy: dirY * PROJECTILE_SPEED,
                damage: PROJECTILE_DAMAGE,
                life: true,
                createdAt: now
            });
            
            lastShotTime = now;
            return true;
        }
        
        // ----- SPIELER SCHADEN (mit Invincibility-Frames)-----
        function damagePlayer(amount, now) {
            if (!gameActive) return;
            if (now < player.invincibleUntil) return;
            player.health -= amount;
            if (player.health <= 0) {
                player.health = 0;
                gameActive = false;
                updateHealthUI();
                return;
            }
            player.invincibleUntil = now + (INVINCIBLE_DURATION * 1000);
            updateHealthUI();
        }
        
        // ----- Kollisionen & Bewegungen mit DeltaTime (Sekunden)-----
        function updateMovement(deltaSec, now) {
            if (!gameActive) return;
            
            // 1. Spieler-Bewegung (Tasten)
            let moveX = 0, moveY = 0;
            if (keys.w || keys.ArrowUp) moveY -= 1;
            if (keys.s || keys.ArrowDown) moveY += 1;
            if (keys.a || keys.ArrowLeft) moveX -= 1;
            if (keys.d || keys.ArrowRight) moveX += 1;
            
            if (moveX !== 0 || moveY !== 0) {
                let len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
                player.x += moveX * player.speed * deltaSec;
                player.y += moveY * player.speed * deltaSec;
            }
            
            // Knockback (falls vorhanden)
            if (player.knockback.x !== 0 || player.knockback.y !== 0) {
                player.x += player.knockback.x * deltaSec;
                player.y += player.knockback.y * deltaSec;
                // verlangsamen
                player.knockback.x *= 0.85;
                player.knockback.y *= 0.85;
                if (Math.abs(player.knockback.x) < 5 && Math.abs(player.knockback.y) < 5) {
                    player.knockback.x = 0;
                    player.knockback.y = 0;
                }
            }
            
            // Spieler Grenzen
            player.x = Math.min(Math.max(player.x, player.radius), canvas.width - player.radius);
            player.y = Math.min(Math.max(player.y, player.radius), canvas.height - player.radius);
            
            // 2. Gegner KI & Bewegung
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 0.01) {
                    let move = ENEMY_SPEED * deltaSec;
                    e.x += (dx / dist) * move;
                    e.y += (dy / dist) * move;
                }
                // Gegner Randbegrenzung
                e.x = Math.min(Math.max(e.x, e.radius), canvas.width - e.radius);
                e.y = Math.min(Math.max(e.y, e.radius), canvas.height - e.radius);
            }
            
            // 3. Gegner - Gegner Kollision (verhindert Überlappung)
            for (let i = 0; i < enemies.length; i++) {
                for (let j = i+1; j < enemies.length; j++) {
                    const a = enemies[i];
                    const b = enemies[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = a.radius + b.radius;
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const overlap = minDist - dist;
                        const pushX = Math.cos(angle) * overlap * 0.5;
                        const pushY = Math.sin(angle) * overlap * 0.5;
                        a.x += pushX;
                        a.y += pushY;
                        b.x -= pushX;
                        b.y -= pushY;
                        // Korrektur der Grenzen
                        a.x = Math.min(Math.max(a.x, a.radius), canvas.width - a.radius);
                        a.y = Math.min(Math.max(a.y, a.radius), canvas.height - a.radius);
                        b.x = Math.min(Math.max(b.x, b.radius), canvas.width - b.radius);
                        b.y = Math.min(Math.max(b.y, b.radius), canvas.height - b.radius);
                    }
                }
            }
            
            // 4. Spieler vs Gegner Kollision + Schaden + Rückstoß
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy);
                const minDist = player.radius + e.radius;
                if (dist < minDist) {
                    // Rückstoß für den Spieler
                    const angle = Math.atan2(dy, dx);
                    const overlap = minDist - dist;
                    const pushX = Math.cos(angle) * overlap;
                    const pushY = Math.sin(angle) * overlap;
                    player.x += pushX;
                    player.y += pushY;
                    // Zusätzlicher Knockback für Dynamik
                    const knockStr = 280;
                    player.knockback.x += Math.cos(angle) * knockStr;
                    player.knockback.y += Math.sin(angle) * knockStr;
                    
                    // Schaden zufügen (Invincibility wird abgefragt)
                    damagePlayer(ENEMY_DAMAGE, now);
                    if (player.health <= 0) gameActive = false;
                    
                    // Gegner kurz zurückdrücken
                    e.x -= Math.cos(angle) * (overlap + 4);
                    e.y -= Math.sin(angle) * (overlap + 4);
                    e.x = Math.min(Math.max(e.x, e.radius), canvas.width - e.radius);
                    e.y = Math.min(Math.max(e.y, e.radius), canvas.height - e.radius);
                }
            }
            
            // 5. Projektile Bewegung
            for (let i = 0; i < projectiles.length; i++) {
                const p = projectiles[i];
                p.x += p.vx * deltaSec;
                p.y += p.vy * deltaSec;
                // Entfernen wenn außerhalb
                if (p.x + p.radius < 0 || p.x - p.radius > canvas.width || p.y + p.radius < 0 || p.y - p.radius > canvas.height) {
                    projectiles.splice(i,1);
                    i--;
                    continue;
                }
            }
            
            // 6. Projektil vs Gegner Kollision
            for (let i = 0; i < projectiles.length; i++) {
                const p = projectiles[i];
                let hit = false;
                for (let j = 0; j < enemies.length; j++) {
                    const e = enemies[j];
                    const dx = p.x - e.x;
                    const dy = p.y - e.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < p.radius + e.radius) {
                        e.health -= p.damage;
                        hit = true;
                        if (e.health <= 0) {
                            enemies.splice(j,1);
                            score++;
                            updateScoreUI();
                        }
                        break;
                    }
                }
                if (hit) {
                    projectiles.splice(i,1);
                    i--;
                }
            }
        }
        
        // ----- Gegner Spawn (zeitbasiert)-----
        function updateSpawning(deltaSec) {
            if (!gameActive) return;
            if (enemies.length < MAX_ENEMIES) {
                spawnAccumulator += deltaSec;
                if (spawnAccumulator >= SPAWN_DELAY) {
                    spawnEnemy(true);
                    spawnAccumulator = 0;
                    // falls immer noch zuwenig und weit unter max: doppelspawn möglich zur Not
                    if (enemies.length < MAX_ENEMIES - 1 && spawnAccumulator > SPAWN_DELAY*0.7) {
                        // nicht zu heftig
                    }
                }
            } else {
                spawnAccumulator = 0;
            }
        }
        
        // ----- GAME OVER ZEICHNUNG + NEUSTART BUTTON LOGIK -----
        function drawGameOverlay() {
            if (!gameActive) {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 44px 'Segoe UI', system-ui";
                ctx.fillStyle = "#ffbc6e";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("🔥 GAME OVER 🔥", canvas.width/2, canvas.height/2 - 40);
                ctx.font = "28px system-ui";
                ctx.fillStyle = "#f9e0a0";
                ctx.fillText("Klicke auf NEUSTART", canvas.width/2, canvas.height/2 + 45);
                ctx.font = "22px monospace";
                ctx.fillStyle = "#ddd8b0";
                ctx.fillText("Highscore: " + highScore, canvas.width/2, canvas.height/2 + 110);
                ctx.textAlign = "left";
            }
        }
        
        // ----- GRAFIK (Brawl Stars inspiriert)-----
        function draw() {
            if (!ctx) return;
            // Hintergrund - gras texture (Raster)
            ctx.fillStyle = "#5fa83d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Gras-Streu-Muster
            ctx.strokeStyle = "#79c753";
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 300; i++) {
                ctx.beginPath();
                let rx = (i * 131) % canvas.width;
                let ry = (i * 253) % canvas.height;
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx+6, ry-8);
                ctx.stroke();
            }
            // Schatten-Effekt (weicher Boden)
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            
            // ----- Gegner zeichnen (Bösewichte mit Gesundheitsbalken)-----
            for (let e of enemies) {
                // Körper
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius-2, 0, Math.PI*2);
                ctx.fillStyle = "#c53a1f";
                ctx.fill();
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius-4, 0, Math.PI*2);
                ctx.fillStyle = "#e05a3a";
                ctx.fill();
                // wütende Augen
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(e.x-8, e.y-6, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x+8, e.y-6, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#1f1a14";
                ctx.beginPath();
                ctx.arc(e.x-7, e.y-7, 2.2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x+9, e.y-7, 2.2, 0, Math.PI*2);
                ctx.fill();
                // Augenbrauen böse
                ctx.beginPath();
                ctx.moveTo(e.x-13, e.y-12);
                ctx.lineTo(e.x-3, e.y-10);
                ctx.lineTo(e.x-7, e.y-8);
                ctx.fillStyle = "#2f1a0e";
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(e.x+15, e.y-12);
                ctx.lineTo(e.x+5, e.y-10);
                ctx.lineTo(e.x+9, e.y-8);
                ctx.fill();
                
                // Gesundheitsbalken
                const healthPercent = e.health / e.maxHealth;
                const barWidth = e.radius * 1.6;
                const barHeight = 6;
                const barX = e.x - barWidth/2;
                const barY = e.y - e.radius - 8;
                ctx.fillStyle = "#631c0c";
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = "#eeaa44";
                ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            }
            
            // ----- Spieler zeichnen (Brawl Stars - Held)-----
            ctx.shadowBlur = 6;
            // Hauptkörper
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-1, 0, Math.PI*2);
            ctx.fillStyle = "#50c8f0";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-4, 0, Math.PI*2);
            ctx.fillStyle = "#7ad0ff";
            ctx.fill();
            // Gesicht: coole Brille + Richtung zur Maus
            let angleToMouse = Math.atan2(mouseY - player.y, mouseX - player.x);
            let eyeOffset = 8;
            let eyeX1 = player.x + Math.cos(angleToMouse - 0.5) * 8;
            let eyeY1 = player.y + Math.sin(angleToMouse - 0.5) * 6;
            let eyeX2 = player.x + Math.cos(angleToMouse + 0.5) * 8;
            let eyeY2 = player.y + Math.sin(angleToMouse + 0.5) * 6;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(eyeX1, eyeY1, 4.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2, eyeY2, 4.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#103644";
            ctx.beginPath();
            ctx.arc(eyeX1+1, eyeY1-1, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2+1, eyeY2-1, 2, 0, Math.PI*2);
            ctx.fill();
            // Lächeln
            ctx.beginPath();
            ctx.arc(player.x+2, player.y+6, 7, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = "#4a2a1a";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // Healthbalken Spieler (oben)
            const playerHealthPercent = player.health / PLAYER_MAX_HEALTH;
            const pBarWidth = player.radius * 2.2;
            const pBarHeight = 8;
            const pBarX = player.x - pBarWidth/2;
            const pBarY = player.y - player.radius - 10;
            ctx.fillStyle = "#421010";
            ctx.fillRect(pBarX, pBarY, pBarWidth, pBarHeight);
            ctx.fillStyle = "#ff6262";
            ctx.fillRect(pBarX, pBarY, pBarWidth * playerHealthPercent, pBarHeight);
            
            // ----- Projektile (Energiekugeln)-----
            for (let p of projectiles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius-2, 0, Math.PI*2);
                ctx.fillStyle = "#FFE484";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius-4, 0, Math.PI*2);
                ctx.fillStyle = "#ffb347";
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
            // kleine Punkte Effekte
            if (gameActive && (performance.now() * 0.005) % 300 < 100) {
                // nichts
            }
        }
        
        // ----- GAME LOOP mit DeltaTime-----
        let lastFrameTime = 0;
        function gameLoop(nowMs) {
            if (!lastFrameTime) lastFrameTime = nowMs;
            let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if (delta <= 0) {
                lastFrameTime = nowMs;
                requestAnimationFrame(gameLoop);
                return;
            }
            lastFrameTime = nowMs;
            
            if (gameActive) {
                updateMovement(delta, nowMs);
                updateSpawning(delta);
                // Wenn Spieler tot, gameActive wird false durch damagePlayer
                if (player.health <= 0) {
                    gameActive = false;
                }
            }
            
            // Zeichnen
            draw();
            if (!gameActive) drawGameOverlay();
            
            requestAnimationFrame(gameLoop);
        }
        
        // ----- EVENT LISTENER (Tastatur & Maus)-----
        function handleKeyDown(e) {
            let key = e.key;
            if (keys.hasOwnProperty(key)) keys[key] = true;
            // Verhindere Scrollen mit Pfeiltasten / WASD
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' ||
                key === 'w' || key === 's' || key === 'a' || key === 'd') {
                e.preventDefault();
            }
        }
        
        function handleKeyUp(e) {
            let key = e.key;
            if (keys.hasOwnProperty(key)) keys[key] = false;
        }
        
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (e.clientX - rect.left) * scaleX;
            let canvasY = (e.clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX, 0), canvas.width);
            canvasY = Math.min(Math.max(canvasY, 0), canvas.height);
            mouseX = canvasX;
            mouseY = canvasY;
        }
        
        function handleMouseClick(e) {
            if (e.button !== 0) return;
            e.preventDefault();
            const now = performance.now();
            if (gameActive) {
                shootProjectile(now);
            }
        }
        
        // Verhindert Kontextmenü auf Canvas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mousedown', handleMouseClick);
        
        // Neustart Button
        const restartBtn = document.getElementById('restartButton');
        restartBtn.addEventListener('click', () => {
            resetGame();
            gameActive = true;
            // alle timestamps zurücksetzen
            lastShotTime = performance.now();
            spawnAccumulator = 0;
            player.invincibleUntil = 0;
            player.health = PLAYER_MAX_HEALTH;
            updateHealthUI();
            updateScoreUI();
        });
        
        // Spiel initialisieren
        resetGame();
        updateScoreUI();
        updateHealthUI();
        
        // Starte Loop
        requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
