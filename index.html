<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BRAWL STARS - Team Arena | Echte Charaktere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a2f1a, #041a0c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: #2b4622;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #e6b450, 0 12px 25px black;
            cursor: crosshair;
            background-color: #6ca842;
        }

        .menu-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 950px;
            max-width: 90vw;
            background: #1e2c18ea;
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 25px;
            text-align: center;
            z-index: 100;
            border: 2px solid #f5bc70;
            box-shadow: 0 20px 40px black;
            color: #ffefcf;
        }

        .menu-screen h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 25px 0;
        }

        .brawler-card {
            background: #2c2a1ccc;
            border-radius: 36px;
            padding: 12px 10px;
            width: 130px;
            cursor: pointer;
            transition: 0.1s linear;
            border: 2px solid #c99242;
        }

        .brawler-card.locked {
            opacity: 0.55;
            filter: grayscale(0.6);
            border-color: #6a5c44;
            cursor: not-allowed;
        }

        .brawler-card.selected {
            background: #ffc164cc;
            border: 3px solid #ffec80;
            transform: scale(1.02);
            box-shadow: 0 0 12px gold;
        }

        .brawler-icon {
            font-size: 3.2rem;
        }

        .brawler-name {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .brawler-stats {
            font-size: 0.7rem;
            background: #00000077;
            border-radius: 30px;
            padding: 4px;
            margin-top: 5px;
        }

        .win-progress {
            font-size: 0.65rem;
            margin-top: 6px;
        }

        .start-btn {
            background: #f5a623;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 60px;
            margin: 10px 0;
            color: #2c2b1f;
            box-shadow: 0 7px 0 #9b5e1a;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #9b5e1a;
        }

        .hide {
            display: none;
        }

        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #141e0eee;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 50px;
            text-align: center;
            z-index: 110;
            border: 2px solid gold;
            color: #ffefb0;
        }

        .result-popup button {
            background: #f0b342;
            border: none;
            padding: 8px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .ingame-ui {
            display: flex;
            justify-content: space-between;
            margin: 12px 20px 0 20px;
            background: #151f0fbb;
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 6px 20px;
            font-weight: bold;
            color: #fff0bc;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1200" height="700" style="width:100%; height:auto; max-width:1200px; aspect-ratio:1200/700"></canvas>
    <div class="ingame-ui">
        <span>❤️ LEBEN: <span id="playerHpUI">100</span>%</span>
        <span>🤝 TEAM: <span id="teamCountUI">2</span> / 2</span>
        <span>👹 GEGNER: <span id="enemyCountUI">3</span> / 3</span>
        <span>🏆 SIEGE: <span id="totalWinsUI">0</span></span>
        <button id="menuBackBtn" style="background:#d48f2b; border:none; border-radius:30px; padding:2px 12px; cursor:pointer;">🏠 MENÜ</button>
    </div>
</div>

<div id="mainMenu" class="menu-screen">
    <h1>⚡ BRAWL STARS ARENA ⚡</h1>
    <p>Wähle deinen BRAWLER (3 Siege = nächster Held)</p>
    <div id="brawlerList" class="brawler-grid"></div>
    <button id="startMatchBtn" class="start-btn">🔥 STARTE KAMPF 🔥</button>
    <div style="margin-top: 12px; font-size:0.8rem;">🎮 WASD bewegen | Maus zielen + Linksklick schießen | Besiege alle 3 Gegner!</div>
</div>

<div id="resultPopup" class="result-popup hide">
    <h2 id="resultTitle">🏆 SIEG</h2>
    <p id="resultMessage">Fantastisch! +1 Sieg</p>
    <button id="closeResultBtn">WEITER ZUM MENÜ</button>
</div>

<script>
    (function(){
        // ---------- 7 BRAWLER (mit individuellen Farben & Accessoires) ----------
        const BRAWLERS = [
            { id:0, name:"SHELLY",   hp:100, speed:285, dmg:34,  projCount:4, spread:0.5, range:420, cooldown:530, color:"#E08E3A", secColor:"#C56A2A", hat:"🤠", eyeColor:"#4A2A1A" },
            { id:1, name:"COLT",     hp:88,  speed:325, dmg:28,  projCount:1, spread:0,   range:540, cooldown:370, color:"#C9AE5D", secColor:"#A88E3A", hat:"⭐", eyeColor:"#3A2E1F" },
            { id:2, name:"BULL",     hp:135, speed:250, dmg:40,  projCount:3, spread:0.45, range:330, cooldown:620, color:"#B55B3A", secColor:"#8E3E1E", hat:"🐂", eyeColor:"#4A2512" },
            { id:3, name:"BROCK",    hp:94,  speed:295, dmg:50,  projCount:1, spread:0,   range:590, cooldown:710, color:"#DD7744", secColor:"#B5552A", hat:"🚀", eyeColor:"#5C2E14" },
            { id:4, name:"LEON",     hp:82,  speed:350, dmg:32,  projCount:2, spread:0.2, range:480, cooldown:430, color:"#6BCB77", secColor:"#48A552", hat:"🍃", eyeColor:"#265C2E" },
            { id:5, name:"EMZ",      hp:96,  speed:310, dmg:28,  projCount:5, spread:0.6, range:390, cooldown:510, color:"#C8559B", secColor:"#A23474", hat:"💄", eyeColor:"#4A1E3A" },
            { id:6, name:"SPIKE",    hp:108, speed:305, dmg:36,  projCount:6, spread:0.7, range:440, cooldown:570, color:"#A9D651", secColor:"#82B530", hat:"🌵", eyeColor:"#3A5C1A" }
        ];

        // Fortschritt
        let winsPerBrawler = new Array(BRAWLERS.length).fill(0);
        let unlocked = [true];
        for(let i=1;i<BRAWLERS.length;i++) unlocked[i]=false;
        let currentBrawlerId = 0;
        
        try{
            let saved = localStorage.getItem("brawlStarsWinsFinal");
            if(saved){
                let arr = JSON.parse(saved);
                if(arr.length===BRAWLERS.length) winsPerBrawler = arr;
                for(let i=1;i<BRAWLERS.length;i++) if(winsPerBrawler[i-1] >= 3) unlocked[i]=true;
            }
        } catch(e){}

        // DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mainMenu = document.getElementById('mainMenu');
        const resultPopup = document.getElementById('resultPopup');
        const resultTitle = document.getElementById('resultTitle');
        const resultMessage = document.getElementById('resultMessage');
        const closeResultBtn = document.getElementById('closeResultBtn');
        const startMatchBtn = document.getElementById('startMatchBtn');
        const menuBackBtn = document.getElementById('menuBackBtn');
        const playerHpSpan = document.getElementById('playerHpUI');
        const teamCountSpan = document.getElementById('teamCountUI');
        const enemyCountSpan = document.getElementById('enemyCountUI');
        const totalWinsSpan = document.getElementById('totalWinsUI');

        // Welt & Karte
        const MAP_W = 2400;
        const MAP_H = 1600;
        let camera = { x:0, y:0 };
        let obstacles = [];
        
        function buildMap(){
            obstacles = [];
            for(let i=0;i<24;i++){
                let x = 300 + Math.random() * 1800;
                let y = 200 + Math.random() * 1200;
                obstacles.push({ x:x, y:y, radius: 24 });
            }
            obstacles.push({ x: 1800, y: 1300, radius: 30 });
            obstacles.push({ x: 600, y: 1400, radius: 28 });
            obstacles.push({ x: 1200, y: 800, radius: 32 });
        }
        buildMap();
        
        function collideWithMap(entity, radius){
            for(let obs of obstacles){
                let dx = entity.x - obs.x;
                let dy = entity.y - obs.y;
                let dist = Math.hypot(dx,dy);
                let min = radius + obs.radius;
                if(dist < min){
                    let angle = Math.atan2(dy,dx);
                    let overlap = min - dist;
                    entity.x += Math.cos(angle) * overlap;
                    entity.y += Math.sin(angle) * overlap;
                }
            }
            entity.x = Math.min(Math.max(entity.x, radius+15), MAP_W - radius-15);
            entity.y = Math.min(Math.max(entity.y, radius+15), MAP_H - radius-15);
        }
        
        // Spielvariablen
        let matchActive = false;
        let player = null;
        let allies = [];
        let enemies = [];
        let projectiles = [];
        let lastFrame = 0;
        let lastShotTime = 0;
        let winCounter = 0;
        let mouseWorld = { x: MAP_W/2, y: MAP_H/2 };
        
        const keys = { w:false, s:false, a:false, d:false, ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false };
        
        // Speichern & Freischaltung
        function saveWins(){
            localStorage.setItem("brawlStarsWinsFinal", JSON.stringify(winsPerBrawler));
            for(let i=1;i<BRAWLERS.length;i++) if(winsPerBrawler[i-1] >= 3) unlocked[i]=true;
            renderMenu();
        }
        
        function addWinToCurrent(){
            winsPerBrawler[currentBrawlerId]++;
            winCounter = winsPerBrawler[currentBrawlerId];
            totalWinsSpan.innerText = winCounter;
            saveWins();
            if(currentBrawlerId+1 < BRAWLERS.length && winsPerBrawler[currentBrawlerId] >= 3 && !unlocked[currentBrawlerId+1]){
                unlocked[currentBrawlerId+1] = true;
                alert(`✨ NEUER BRAWLER: ${BRAWLERS[currentBrawlerId+1].name} freigeschaltet! ✨`);
                renderMenu();
            }
        }
        
        // Bots erstellen
        function createBot(isAlly, brawlerData, x, y){
            return {
                x, y, radius: 20,
                brawler: {...brawlerData},
                health: brawlerData.hp,
                maxHealth: brawlerData.hp,
                isAlly: isAlly,
                lastShot: performance.now() - Math.random()*400,
                speed: brawlerData.speed,
                knockback: {x:0,y:0}
            };
        }
        
        // Gegner spawnen auf der anderen Seite der Karte
        function spawnOpponents(teamCenterX, teamCenterY){
            let enemiesList = [];
            let side = (teamCenterX < MAP_W/2) ? "right" : "left";
            let baseX = (side === "right") ? MAP_W - 450 : 450;
            let baseY = teamCenterY + (Math.random() - 0.5)*200;
            baseY = Math.min(Math.max(baseY, 200), MAP_H-200);
            let brawlerIndices = [1,3,5];
            for(let i=0;i<3;i++){
                let bData = BRAWLERS[brawlerIndices[i % brawlerIndices.length]];
                let xOff = (i-1)*110;
                let enemy = createBot(false, bData, baseX + xOff, baseY + (i%2)*50);
                enemiesList.push(enemy);
            }
            return enemiesList;
        }
        
        function spawnAllies(centerX, centerY){
            let alliesList = [];
            let allyBrawlers = [BRAWLERS[0], BRAWLERS[2]];
            for(let i=0;i<2;i++){
                let offX = (i===0? -70 : 70);
                let ally = createBot(true, allyBrawlers[i], centerX + offX, centerY - 30);
                alliesList.push(ally);
            }
            return alliesList;
        }
        
        function startMatch(){
            matchActive = true;
            let brawler = BRAWLERS[currentBrawlerId];
            let startX = MAP_W/2 - 180;
            let startY = MAP_H/2;
            player = {
                x: startX, y: startY, radius: 20,
                brawler: brawler,
                health: brawler.hp,
                maxHealth: brawler.hp,
                speed: brawler.speed,
                invincibleUntil: 0,
                knockback: {x:0,y:0}
            };
            allies = spawnAllies(player.x, player.y);
            enemies = spawnOpponents(player.x, player.y);
            projectiles = [];
            lastShotTime = performance.now();
            updateCamera();
            updateUI();
        }
        
        function updateCamera(){
            if(!player) return;
            camera.x = player.x - canvas.width/2;
            camera.y = player.y - canvas.height/2;
            camera.x = Math.min(Math.max(camera.x, 0), MAP_W - canvas.width);
            camera.y = Math.min(Math.max(camera.y, 0), MAP_H - canvas.height);
        }
        
        function updateUI(){
            if(player) playerHpSpan.innerText = Math.max(0, Math.floor((player.health/player.maxHealth)*100));
            let aliveAllies = allies.filter(a=>a.health>0).length;
            teamCountSpan.innerText = aliveAllies;
            enemyCountSpan.innerText = enemies.length;
            totalWinsSpan.innerText = winsPerBrawler[currentBrawlerId];
        }
        
        // Schießen
        function playerShoot(now){
            if(!matchActive || player.health<=0) return false;
            let cd = player.brawler.cooldown;
            if(now - lastShotTime < cd) return false;
            let dx = mouseWorld.x - player.x;
            let dy = mouseWorld.y - player.y;
            let len = Math.hypot(dx,dy);
            if(len<0.01) return false;
            dx/=len; dy/=len;
            let b = player.brawler;
            let count = b.projCount;
            let spread = b.spread;
            for(let i=0;i<count;i++){
                let angleOff = (i - (count-1)/2) * spread;
                let cosA = Math.cos(angleOff);
                let sinA = Math.sin(angleOff);
                let dirX = dx*cosA - dy*sinA;
                let dirY = dx*sinA + dy*cosA;
                projectiles.push({
                    x: player.x, y: player.y, radius: 7,
                    vx: dirX * 780, vy: dirY * 780,
                    damage: b.dmg,
                    isPlayer: true,
                    owner: player
                });
            }
            lastShotTime = now;
            return true;
        }
        
        // Bot KI (bewegt sich immer, schießt nur in Reichweite)
        function updateBot(bot, delta, now, enemiesList, alliesList, playerUnit){
            if(bot.health<=0) return;
            // Nächsten Feind suchen
            let opponents = bot.isAlly ? enemiesList : [playerUnit, ...alliesList];
            let closest = null;
            let minDist2 = Infinity;
            for(let opp of opponents){
                if(opp.health<=0) continue;
                let d2 = (bot.x-opp.x)**2 + (bot.y-opp.y)**2;
                if(d2 < minDist2){
                    minDist2 = d2;
                    closest = opp;
                }
            }
            if(closest && closest.health>0){
                let dx = closest.x - bot.x;
                let dy = closest.y - bot.y;
                let dist = Math.hypot(dx,dy);
                if(dist > 0.01){
                    let move = bot.speed * delta;
                    bot.x += (dx/dist) * move;
                    bot.y += (dy/dist) * move;
                }
                // Angriff nur wenn im eigenen Range
                let range = bot.brawler.range;
                if(dist < range + 35 && (now - bot.lastShot) > bot.brawler.cooldown){
                    let dirX = closest.x - bot.x;
                    let dirY = closest.y - bot.y;
                    let len = Math.hypot(dirX,dirY);
                    if(len>0.01){
                        dirX/=len; dirY/=len;
                        let bData = bot.brawler;
                        let count = bData.projCount;
                        let spread = bData.spread;
                        for(let i=0;i<count;i++){
                            let angleOff = (i - (count-1)/2) * spread;
                            let cosA = Math.cos(angleOff);
                            let sinA = Math.sin(angleOff);
                            let dirX2 = dirX*cosA - dirY*sinA;
                            let dirY2 = dirX*sinA + dirY*cosA;
                            projectiles.push({
                                x: bot.x, y: bot.y, radius: 7,
                                vx: dirX2 * 720, vy: dirY2 * 720,
                                damage: bData.dmg,
                                isPlayer: false,
                                owner: bot
                            });
                        }
                        bot.lastShot = now;
                    }
                }
            }
            // Knockback
            if(bot.knockback.x !==0 || bot.knockback.y !==0){
                bot.x += bot.knockback.x * delta;
                bot.y += bot.knockback.y * delta;
                bot.knockback.x *= 0.85;
                bot.knockback.y *= 0.85;
                if(Math.abs(bot.knockback.x)<0.5) bot.knockback.x=0;
                if(Math.abs(bot.knockback.y)<0.5) bot.knockback.y=0;
            }
            collideWithMap(bot, bot.radius);
        }
        
        function updateGame(delta, now){
            if(!matchActive) return;
            if(player.health <= 0){
                matchActive = false;
                showResult("lose");
                return;
            }
            // Spieler Bewegung
            let mx=0, my=0;
            if(keys.w || keys.ArrowUp) my-=1;
            if(keys.s || keys.ArrowDown) my+=1;
            if(keys.a || keys.ArrowLeft) mx-=1;
            if(keys.d || keys.ArrowRight) mx+=1;
            if(mx!==0 || my!==0){
                let len = Math.hypot(mx,my);
                mx/=len; my/=len;
                player.x += mx * player.speed * delta;
                player.y += my * player.speed * delta;
            }
            if(player.knockback.x !==0 || player.knockback.y !==0){
                player.x += player.knockback.x * delta;
                player.y += player.knockback.y * delta;
                player.knockback.x *= 0.85;
                player.knockback.y *= 0.85;
                if(Math.abs(player.knockback.x)<0.5) player.knockback.x=0;
                if(Math.abs(player.knockback.y)<0.5) player.knockback.y=0;
            }
            collideWithMap(player, player.radius);
            
            // Aktualisiere Bots (alle bewegen sich)
            for(let i=0;i<allies.length;i++){
                if(allies[i].health>0) updateBot(allies[i], delta, now, enemies, allies.filter(a=>a!==allies[i] && a.health>0), player);
                else { allies.splice(i,1); i--; }
            }
            for(let i=0;i<enemies.length;i++){
                if(enemies[i].health>0) updateBot(enemies[i], delta, now, [player, ...allies], enemies.filter(e=>e!==enemies[i] && e.health>0), player);
                else { enemies.splice(i,1); i--; }
            }
            
            // Kollision Spieler vs Gegner (Schaden)
            for(let e of enemies){
                if(e.health<=0) continue;
                let dist = Math.hypot(player.x-e.x, player.y-e.y);
                if(dist < player.radius+e.radius){
                    let angle = Math.atan2(e.y-player.y, e.x-player.x);
                    let knock = 280;
                    player.knockback.x += Math.cos(angle)*knock;
                    player.knockback.y += Math.sin(angle)*knock;
                    if(now >= player.invincibleUntil){
                        player.health -= 16;
                        player.invincibleUntil = now + 550;
                        if(player.health<=0) matchActive=false;
                    }
                    e.x += Math.cos(angle)*22;
                    e.y += Math.sin(angle)*22;
                    collideWithMap(e, e.radius);
                }
            }
            
            // Projektile
            for(let i=0;i<projectiles.length;i++){
                let p = projectiles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                if(p.x<-300 || p.x>MAP_W+300 || p.y<-300 || p.y>MAP_H+300){
                    projectiles.splice(i,1); i--; continue;
                }
                let hitWall=false;
                for(let obs of obstacles){
                    if(Math.hypot(p.x-obs.x, p.y-obs.y) < p.radius+obs.radius){
                        hitWall=true; break;
                    }
                }
                if(hitWall){ projectiles.splice(i,1); i--; continue; }
                
                let hit = false;
                if(p.isPlayer){
                    for(let j=0;j<enemies.length;j++){
                        let e=enemies[j];
                        if(e.health>0 && Math.hypot(p.x-e.x, p.y-e.y) < p.radius+e.radius){
                            e.health -= p.damage;
                            hit=true;
                            if(e.health<=0) enemies.splice(j,1);
                            break;
                        }
                    }
                } else {
                    if(player.health>0 && Math.hypot(p.x-player.x, p.y-player.y) < p.radius+player.radius){
                        player.health -= p.damage;
                        hit=true;
                        if(player.health<=0) matchActive=false;
                    }
                    if(!hit){
                        for(let a of allies){
                            if(a.health>0 && Math.hypot(p.x-a.x, p.y-a.y) < p.radius+a.radius){
                                a.health -= p.damage;
                                hit=true;
                                if(a.health<=0) break;
                            }
                        }
                    }
                }
                if(hit){ projectiles.splice(i,1); i--; }
            }
            
            if(enemies.length === 0 && matchActive){
                matchActive = false;
                addWinToCurrent();
                showResult("win");
                return;
            }
            updateUI();
        }
        
        function showResult(type){
            if(type === "win"){
                resultTitle.innerText = "🏆 SIEG! 🏆";
                resultMessage.innerText = `Du und dein Team habt gewonnen! +1 Sieg für ${BRAWLERS[currentBrawlerId].name}`;
            } else {
                resultTitle.innerText = "💀 NIEDERLAGE 💀";
                resultMessage.innerText = "Dein Team wurde besiegt. Versuch's nochmal!";
            }
            resultPopup.classList.remove("hide");
        }
        
        // ---------- GRAFIK (Detaillierte, farbige Charaktere) ----------
        function drawCharacter(x, y, brawler, isPlayer, healthPercent){
            // Schatten
            ctx.shadowBlur = 4;
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            // Hauptkörper
            ctx.beginPath();
            ctx.arc(x, y, 21, 0, Math.PI*2);
            ctx.fillStyle = brawler.color;
            ctx.fill();
            ctx.strokeStyle = "#4A2E1A";
            ctx.lineWidth = 1.8;
            ctx.stroke();
            // Gesichtsfarbe (heller)
            ctx.beginPath();
            ctx.arc(x-3, y-3, 12, 0, Math.PI*2);
            ctx.fillStyle = "#FFE0B5";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+3, y-3, 12, 0, Math.PI*2);
            ctx.fill();
            // Augen
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.arc(x-9, y-7, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+9, y-7, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = brawler.eyeColor;
            ctx.beginPath();
            ctx.arc(x-8, y-8, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+10, y-8, 2.5, 0, Math.PI*2);
            ctx.fill();
            if(isPlayer){
                let angle = Math.atan2(mouseWorld.y - player.y, mouseWorld.x - player.x);
                let offX = Math.cos(angle)*1.8;
                let offY = Math.sin(angle)*1.5;
                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(x-8+offX, y-8+offY, 1.4, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(x+10+offX, y-8+offY, 1.4, 0, 2*Math.PI); ctx.fill();
            } else {
                ctx.fillStyle = "#1A1A1A";
                ctx.beginPath(); ctx.arc(x-8, y-8, 1.5, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(x+10, y-8, 1.5, 0, 2*Math.PI); ctx.fill();
            }
            // Mund (cooles Lächeln)
            ctx.beginPath();
            ctx.arc(x, y+4, 8, 0.1, Math.PI - 0.1);
            ctx.strokeStyle = "#6B3E1A";
            ctx.lineWidth = 2;
            ctx.stroke();
            // Hut / Accessoire
            ctx.font = "28px 'Segoe UI'";
            ctx.fillStyle = "#F7C56E";
            ctx.fillText(brawler.hat, x-14, y-23);
            // Gesundheitsbalken
            ctx.fillStyle = "#611c1c";
            ctx.fillRect(x-28, y-35, 56, 7);
            ctx.fillStyle = "#E65C3A";
            ctx.fillRect(x-28, y-35, 56 * healthPercent, 7);
            ctx.shadowBlur = 0;
        }
        
        function renderGame(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#8BC34A";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            // Kräuter / Gras Muster
            for(let i=0;i<200;i++){
                ctx.beginPath();
                let sx = (i*131)%canvas.width;
                let sy = (i*253)%canvas.height;
                ctx.moveTo(sx,sy);
                ctx.lineTo(sx+5,sy-9);
                ctx.strokeStyle = "#6E9F3E";
                ctx.stroke();
            }
            // Hindernisse
            for(let obs of obstacles){
                let scrX = obs.x - camera.x;
                let scrY = obs.y - camera.y;
                if(scrX+obs.radius<0 || scrX-obs.radius>canvas.width || scrY+obs.radius<0 || scrY-obs.radius>canvas.height) continue;
                ctx.beginPath();
                ctx.arc(scrX, scrY, obs.radius-2, 0, 2*Math.PI);
                ctx.fillStyle = "#8B694C";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(scrX-4, scrY-4, obs.radius-9, 0, 2*Math.PI);
                ctx.fillStyle = "#B38B65";
                ctx.fill();
            }
            // Verbündete
            for(let a of allies) if(a.health>0){
                let scr = { x: a.x - camera.x, y: a.y - camera.y };
                if(scr.x+40>0 && scr.x-40<canvas.width && scr.y+40>0 && scr.y-40<canvas.height)
                    drawCharacter(scr.x, scr.y, a.brawler, false, a.health/a.maxHealth);
            }
            // Gegner
            for(let e of enemies) if(e.health>0){
                let scr = { x: e.x - camera.x, y: e.y - camera.y };
                if(scr.x+40>0 && scr.x-40<canvas.width && scr.y+40>0 && scr.y-40<canvas.height)
                    drawCharacter(scr.x, scr.y, e.brawler, false, e.health/e.maxHealth);
            }
            // Spieler
            if(player){
                let scr = { x: player.x - camera.x, y: player.y - camera.y };
                drawCharacter(scr.x, scr.y, player.brawler, true, player.health/player.maxHealth);
            }
            // Projektile
            for(let p of projectiles){
                let scrX = p.x - camera.x;
                let scrY = p.y - camera.y;
                ctx.beginPath();
                ctx.arc(scrX, scrY, 6, 0, 2*Math.PI);
                ctx.fillStyle = "#FFC857";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(scrX-1, scrY-1, 2.5, 0, 2*Math.PI);
                ctx.fillStyle = "#FFA500";
                ctx.fill();
            }
            if(!matchActive && player && player.health<=0){
                ctx.font = "bold 44px 'Segoe UI'";
                ctx.fillStyle = "#FFDD88";
                ctx.shadowBlur = 0;
                ctx.fillText("💀 GAME OVER 💀", canvas.width/2-130, canvas.height/2);
            }
        }
        
        // --- Menü rendern ---
        function renderMenu(){
            const container = document.getElementById('brawlerList');
            container.innerHTML = '';
            for(let i=0;i<BRAWLERS.length;i++){
                let b = BRAWLERS[i];
                let isUnlocked = unlocked[i];
                let wins = winsPerBrawler[i];
                let card = document.createElement('div');
                card.className = `brawler-card ${!isUnlocked ? 'locked' : ''} ${currentBrawlerId===i ? 'selected' : ''}`;
                if(isUnlocked){
                    card.onclick = () => { currentBrawlerId = i; renderMenu(); };
                }
                card.innerHTML = `
                    <div class="brawler-icon">${b.hat}</div>
                    <div class="brawler-name">${b.name}</div>
                    <div class="brawler-stats">❤️${b.hp} ⚡${b.speed} 💥${b.dmg}</div>
                    <div class="win-progress">${isUnlocked ? (wins>=3 ? "🏆 MEISTER" : `🏅 ${wins}/3 Siege`) : "🔒 3 Siege nötig"}</div>
                `;
                container.appendChild(card);
            }
        }
        
        // --- Loop ---
        let lastTime = 0;
        function animate(nowMs){
            requestAnimationFrame(animate);
            let delta = Math.min(0.033, (nowMs - (lastTime||nowMs))/1000);
            if(delta<0.01){ lastTime=nowMs; return; }
            lastTime = nowMs;
            if(matchActive){
                updateGame(delta, nowMs);
                updateCamera();
            }
            renderGame();
        }
        
        // --- Events ---
        function worldMouseFromCanvas(e){
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width/rect.width;
            const sy = canvas.height/rect.height;
            let cx = (e.clientX - rect.left)*sx;
            let cy = (e.clientY - rect.top)*sy;
            mouseWorld.x = camera.x + cx;
            mouseWorld.y = camera.y + cy;
            mouseWorld.x = Math.min(Math.max(mouseWorld.x,0), MAP_W);
            mouseWorld.y = Math.min(Math.max(mouseWorld.y,0), MAP_H);
        }
        
        function initEvents(){
            window.addEventListener('keydown', (e)=>{
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) keys[k]=true;
                if(['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
            });
            window.addEventListener('keyup', (e)=>{
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) keys[k]=false;
            });
            canvas.addEventListener('mousemove', worldMouseFromCanvas);
            canvas.addEventListener('mousedown', (e)=>{
                if(e.button!==0) return;
                e.preventDefault();
                if(matchActive && player && player.health>0) playerShoot(performance.now());
            });
            canvas.addEventListener('contextmenu', e=>e.preventDefault());
            startMatchBtn.onclick = () => {
                mainMenu.classList.add('hide');
                startMatch();
            };
            menuBackBtn.onclick = () => {
                matchActive = false;
                mainMenu.classList.remove('hide');
                resultPopup.classList.add('hide');
                renderMenu();
            };
            closeResultBtn.onclick = () => {
                resultPopup.classList.add('hide');
                mainMenu.classList.remove('hide');
                matchActive = false;
                renderMenu();
            };
        }
        
        renderMenu();
        initEvents();
        animate(0);
    })();
</script>
</body>
</html>
